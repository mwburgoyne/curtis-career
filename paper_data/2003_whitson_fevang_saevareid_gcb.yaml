- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li><strong>Fevang &amp; Whitson (1996) SPE-30714</strong> — the three-region model and its <code>k<sub>rg</sub> = f(k<sub>rg</sub>/k<sub>ro</sub>)</code> framework</li>
    <li><strong>Whitson &amp; Fevang (1997) IBC</strong> — the generalised pseudopressure with the original capillary-number transition function</li>
    <li><strong>Sævareid, Whitson &amp; Fevang (1999) SCA-40899</strong> — the closed-loop apparatus, the no-significant-hysteresis finding, and the original <code>α = 10<sup>4</sup>/√(kφ)</code> Berea calibration</li>
    <li><strong>Panfilov</strong> — the monovariance theorem for steady-state compositional flow (theoretical development credited in acknowledgements, p. 310)</li>
    <li>Henderson et al. (Heriot-Watt, 1995, 1996, 1998) — Berea steady-state gas-condensate k<sub>r</sub> data feeding the combined regression</li>
    <li>Blom (Delft, 1999) and Blom &amp; Hagoort (2003) — second Berea dataset for the combined regression</li>
    <li>Evinger &amp; Muskat (1942), Muskat (1949) — the steady-state k<sub>r</sub>-ratio identity in oil-well form</li>
    <li>Leverett (1941) J-function scaling for √(k/φ) capillary forces</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li><strong>Whitson &amp; Brule (2000) SPE Monograph "Phase Behavior"</strong>, Chapter 7 — the textbook coverage of gas-condensate well-deliverability; the monograph predates this paper but draws on the same project material</li>
    <li>Default Whitson-Fevang capillary-number calibration (<code>α = 2×10<sup>4</sup>/√(kφ)</code>, n = 0.7) used in subsequent gas-condensate field studies that need a parametric N<sub>c</sub>-k<sub>r</sub> model</li>
    <li>The endpoint-scaling procedure for heterogeneous strata is adopted in multi-rock-type compositional simulation workflows</li>
    <li>The four-step lab design procedure becomes the reference protocol for SCAL groups designing gas-condensate k<sub>r</sub> campaigns</li>
    <li>The monovariance result is the theoretical foundation later cited in PhD work on steady-state compositional flow and on inflow-performance for retrograde-gas systems</li>
    <li>The high-N<sub>c</sub>-via-lower-IFT design lesson reshapes lab planning when field N<sub>c</sub> targets cannot be reached by pumping</li>
    </ul>
  box_style: connections
- heading: Key Collaborators
  body_html: |-
    <p><strong>Øivind Fevang</strong> — second NTH PhD with <mark>Whitson</mark>, lead author on the 1996 three-region paper. The 2003 consolidation re-orders the author list with <mark>Whitson</mark> first (as the senior project lead writing for journal publication) but the technical content threads through Øivind's dissertation work.</p><p><strong>Arne Sævareid</strong> — ResLab experimentalist responsible for the closed-loop apparatus and the 1999 SCA measurement programme. Third-author position in 2003 reflects his experimental contribution to a synthesis paper led by the theorists.</p><p><strong>Mikhail Panfilov</strong> — visiting collaborator credited for the monovariance theoretical development. Acknowledged on p. 310 in language that explicitly attributes the steady-state compositional-flow proof.</p><p>Project sponsors: BP, Chevron, INA, Mobil, Norsk Hydro, NFR, NPD, Occidental, Saga.</p>
