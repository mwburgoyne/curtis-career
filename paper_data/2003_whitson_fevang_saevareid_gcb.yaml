sections:
- heading: Context
  body_html: |-
    <p>The 2003 <em>Transport in Porous Media</em> paper is the consolidated journal treatment of the Gas Condensate Well Performance project (1996-1999). It pulls together the three-region model (1996 SPE-30714), the generalised pseudopressure (1997 IBC), the closed-loop steady-state measurements (1999 SCA-40899), and the rock-property capillary-number scaling into a single 33-page journal paper with a theoretical proof, an updated calibration, a heterogeneous-reservoir scaling procedure, and a four-step laboratory design protocol.</p><p>The paper is also where <mark>Whitson</mark> credits Mikhail Panfilov for the monovariance theorem that turns the pseudopressure approach from an engineering trick into a derived consequence of steady-state compositional flow. Acknowledgement of Panfilov on p. 310 is one of very few places in the Whitson corpus where a foundational theoretical result is explicitly attributed to an outside collaborator.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Panfilov monovariance theorem.</strong> Under steady-state, two-phase, multicomponent flow with negligible diffusion, the thermodynamic sub-system is monovariant: all thermodynamic variables are single-valued functions of pressure alone. Mass conservation forces total flowing composition to be constant in space. The phase true velocities must be equal (<code>V<sub>g</sub> = V<sub>o</sub></code>) for consistency. The remaining <code>3N + 4</code> equations in <code>3N + 5</code> variables have state variance 1, so taking pressure as independent forces every other thermodynamic quantity to be a function of p only. Consequence for engineering: all PVT functions inside the pseudopressure integral reduce to a CCE on the produced wellstream at fixed overall composition. No coupling between flow physics and compositional flash is needed during reservoir simulation. The pseudopressure framework is <em>exact</em> within its scope.</li>
    <li><strong>Universal viscosity-weighted identity for k<sub>rg</sub>/k<sub>ro</sub>.</strong> The pure-thermodynamic identity <code>(k<sub>rg</sub> μ<sub>o</sub>)/(k<sub>ro</sub> μ<sub>g</sub>) = (1 - s)/s</code> (zero capillary pressure) or <code>= (1 - s)/s · dP<sub>o</sub>/dP</code> (non-zero P<sub>c</sub>) where <code>s = q<sub>o</sub>/(q<sub>o</sub> + q<sub>g</sub>) = V<sub>ro</sub></code> is the flowing oil fraction. The ratio is a thermodynamic variable depending on pressure alone via monovariance. Rock-specific data enters only through <code>k<sub>rg</sub> = f(k<sub>rg</sub>/k<sub>ro</sub>)</code>, not through the ratio itself. Saturation-free measurement (ATM-0273) is justified rigorously.</li>
    <li><strong>Updated capillary-number transition function calibration.</strong> Combined regression of Heriot-Watt (Henderson et al. 1995, 1996) and Delft (Blom 1999; Blom and Hagoort 2003) steady-state Berea data gives <code>f<sub>I</sub> = 1/[(α N<sub>c</sub>)<sup>n</sup> + 1]</code> with <code>α = 2×10<sup>4</sup>/√(kφ)</code> and <code>n = 0.7</code>. k is in millidarcies, φ is a fraction, N<sub>c</sub> is the Whitson-Fevang capillary number <code>v<sub>pg</sub> μ<sub>g</sub>/σ<sub>go</sub></code>. The α value has doubled from the 1999 single-Berea fit; the exponent magnitude (|n| ≈ 0.7) is stable across calibrations. The interpolation is evaluated at fixed <code>k<sub>rg</sub>/k<sub>ro</sub></code>, not at fixed saturation, so the fit has two adjustable parameters instead of four (the Coats and Blom-Hagoort saturation-based forms need separate <code>k<sub>rg</sub>, k<sub>ro</sub>, S<sub>gc</sub>, S<sub>oc</sub></code> calibrations).</li>
    <li><strong>Consistent endpoint scaling for heterogeneous strata.</strong> A single rock's measured <code>k<sub>rg</sub> = f(k<sub>rg</sub>/k<sub>ro</sub>)</code> correlation can be applied across multiple rock types by piecewise-linear saturation mapping plus same-multiplier scaling of both k<sub>rg</sub> and k<sub>ro</sub>. The mapping is four regions: below critical gas, main two-phase flow, near residual-oil, and connate water. Applying the <em>same</em> multiplicative scaling to both phases preserves the k<sub>rg</sub>/k<sub>ro</sub> ratio at the rescaled saturation, which preserves the universal <code>k<sub>rg</sub> = f(k<sub>rg</sub>/k<sub>ro</sub>)</code> relation. The procedure makes reservoir-wide simulation possible without measuring every rock type. The paper notes (p. 298) it is "a good approximation for reservoirs when sufficient data is available to develop independent correlations for each rock type" - the scaled single-rock data is about as good as the cost of measuring everything.</li>
    <li><strong>Four-step laboratory design procedure.</strong>
    <ol>
    <li><em>Define the relevant k<sub>rg</sub>/k<sub>ro</sub> range from PVT alone.</em> Simulate CVD on the reservoir fluid; for each CVD gas, simulate CCE on the produced wellstream reporting V<sub>ro</sub> and μ<sub>g</sub>/μ<sub>o</sub> across the pressure range from dewpoint to minimum BHFP. Use Eq. 2.12a to convert each <code>(V<sub>ro</sub>, μ<sub>g</sub>/μ<sub>o</sub>)</code> into k<sub>rg</sub>/k<sub>ro</sub>. Rich condensates: 0.5 to 10. Lean: 10 to 100.</li>
    <li><em>Measure five immiscible (low-N<sub>c</sub>) k<sub>rg</sub> points</em> with equilibrium gas-oil mixtures targeted to evenly-spaced k<sub>rg</sub>/k<sub>ro</sub> values across the range.</li>
    <li><em>Measure high-N<sub>c</sub> k<sub>rg</sub> via lower IFT, not higher velocity.</em> Lab pump rates rarely reach field velocities; even when they do, inertial HVF pressure drops contaminate the k<sub>r</sub> interpretation. Instead, increase core pressure (lower IFT) at lab-feasible flow rates. A worked field example: <code>q<sub>g,max</sub> = 2×10<sup>6</sup> Sm<sup>3</sup>/d, h = 100 m, k = 50 md, σ<sub>go</sub> = 3 mN/m, μ<sub>g</sub> = 0.02 mPa·s</code> gives <code>N<sub>c</sub> ≈ 2×10<sup>-4</sup></code> corresponding to <code>f<sub>I</sub> ≈ 0.434</code> and k<sub>rg</sub> improving from 0.1 (immiscible) to 0.33 (high N<sub>c</sub>).</li>
    <li><em>Select a synthetic fluid if needed.</em> A synthetic mixture (typically C1 + C8 + C16) regressed to match dewpoint, V<sub>ro</sub>, Z, and ideally μ<sub>g</sub>/μ<sub>o</sub> reproduces the <code>k<sub>rg</sub> = f(k<sub>rg</sub>/k<sub>ro</sub>)</code> relation of the real fluid at one-tenth the manufacturing cost. IFT below 0.1 mN/m must be measured, not predicted - parachor correlations become unreliable in that regime.</li>
    </ol>
    </li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The journal-grade consolidation.</strong> Three sponsor-restricted project papers (1996 SPE-30714, 1997 IBC, 1999 SCA-40899) become one peer-reviewed Kluwer paper with a theoretical proof, updated calibration, and design procedure. The 2003 paper is the citation point of record for the Fevang-Whitson framework in non-SPE literature and in PhD theses that need a journal reference for the steady-state compositional-flow result.</p>
    <p><strong>Panfilov and the theoretical reframing.</strong> Crediting Mikhail Panfilov for the monovariance theorem reframes the pseudopressure method as a derived consequence of compositional flow, not an engineering shortcut. The theorem is what justifies the saturation-free measurement programme and the CCE-on-produced-composition recipe. It is also a marker of <mark>Whitson</mark>'s practice of acknowledging foundational contributions from collaborators - the Panfilov credit on p. 310 is structurally similar to the Michelsen credit in the 1989 negative-flash paper and the Stanford-Standing lineage acknowledged across the C7+ work.</p>
    <p><strong>Updated calibration as design default.</strong> The <code>α = 2×10<sup>4</sup>/√(kφ)</code> and n = 0.7 values are now the central-tendency calibration of the Whitson-Fevang capillary-number transition function. Subsequent gas-condensate field studies that need a default N<sub>c</sub>-k<sub>r</sub> model use this calibration. The two-parameter form is the methodological alternative to four-parameter Coats-style fits and is what coarse-grid well-treatment workflows (pseudopressure, blockage-skin) consume.</p>
    <p><strong>Lab design procedure that engineers can follow.</strong> The four-step procedure makes the saturation-free, k<sub>rg</sub>/k<sub>ro</sub>-targeted measurement programme transferable. SCAL labs that have read the 1999 SCA paper as a Berea case study now have a procedure for taking any new gas-condensate reservoir into a few-week measurement campaign tied to that reservoir's expected economic life-cycle k<sub>rg</sub>/k<sub>ro</sub> range.</p>
