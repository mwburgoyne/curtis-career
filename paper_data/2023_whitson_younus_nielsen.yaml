sections:
- heading: Context
  body_html: |-
    <p>The Hoffman-Crump-Hocott K-value plot has been the industry's separator-sample quality-control tool since 1953. It flags compositional inconsistency between separator gas and separator oil but does not correct it. For seventy years, when a Hoffman plot showed scatter, the engineer either accepted the sample, requested a re-sample, or made an unspecified judgement call. The Whitson AS team (Curtis, Bilal Younus, and Markus Hays Nielsen - listed on the byline as M.H. Nielsen) closed that loop. SPE-217328 introduces the first quantitative method for correcting laboratory-reported separator compositions when the lab-reported numbers fail thermodynamic consistency at the separator conditions.</p><p>The paper sits inside a three-paper Whitson AS series on compositional uncertainty: SPE-211391 (Younus-Whitson-Martinsen 2022, backward QC to identify lab errors via the gamma model), this paper (backward correction), and SPE-220699 (Nielsen-Wanat-Whitson 2024, forward propagation of compositional errors through phase-behaviour calculations). The series is a sustained operational programme on the question every PVT engineer faces and most pretend they have already solved.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>ECM-flash separator-sample correction method.</strong> The Fevang-Whitson 1994 equilibrium-contact-mixing framework was built to reconstruct in-situ reservoir fluid from non-equilibrium downhole samples drawn from different reservoir locations. This paper adapts the same machinery to the single-sample QC problem. The workflow:
        <ol>
    <li>Compute the lab-reported wellstream <code>z<sub>wL,i</sub> = β<sub>w</sub> y<sub>spL,i</sub> + (1 - β<sub>w</sub>) x<sub>spL,i</sub></code> using the lab-derived recombination ratio <code>β<sub>w</sub></code> from the measured separator GOR and oil properties.</li>
    <li>Flash <code>z<sub>wL</sub></code> at separator conditions <code>(T<sub>sp</sub>, p<sub>sp</sub>)</code> using K-values from a tuned EOS, a default EOS, the Standing 1979 correlation (for <code>p<sub>sp</sub> &lt; 1000</code> psia), or the Whitson-Torp modified Wilson equation. The Rachford-Rice phase split returns corrected separator gas, corrected separator oil, and flash gas-phase mole fraction <code>β<sub>F</sub></code>.</li>
    <li>Recombine the corrected compositions with the lab-derived <code>β<sub>w</sub></code> to get the corrected wellstream <code>z<sub>wC</sub></code>.</li>
    </ol>
        The component-wise correction (Eq 5):
        <p><code>x<sub>spC,i</sub> = x<sub>spL,i</sub> · [β<sub>w</sub>(K<sub>spL,i</sub> - 1) + 1] / [β<sub>F</sub>(K<sub>spC,i</sub> - 1) + 1]</code></p>
        with <code>y<sub>spC,i</sub> = x<sub>spC,i</sub> K<sub>spC,i</sub></code>. The method does not require the underlying laboratory error to be identified or even known. The ECM flash automatically redistributes mass to satisfy thermodynamic equilibrium at the separator conditions.</li>
    <li><strong>Validation on synthetic-error injection.</strong> Volatile oil (<code>R<sub>p</sub> ≈ 2000</code> scf/STB, <code>T<sub>sp</sub> = 100</code> °F, <code>p<sub>sp</sub> = 250</code> psia) and gas condensate (<code>R<sub>p</sub> ≈ 30,000</code> scf/STB, <code>T<sub>sp</sub> = 150</code> °F, <code>p<sub>sp</sub> = 1500</code> psia) examples. Injected errors: 50% leakage of both sample bottles at 80°F, 75% <code>C<sub>6+</sub></code> loss in the separator gas GC, 25% <code>C<sub>2-</sub></code> loss in the separator oil GC. The corrected wellstream comes back to within 0.2 mol% of the exact composition across all components. Corrected separator oil to within 0.5 mol%, corrected separator gas to within 0.3 mol%.</li>
    <li><strong>Log-log K-value cross-plot as companion diagnostic.</strong> Plot <code>K<sub>spL,i</sub></code> against <code>K<sub>spC,i</sub></code> on log-log axes, both at the same separator conditions. Points on the 45-degree line are samples in equilibrium. Points consistently above indicate excess <code>y<sub>spL</sub></code> or low <code>x<sub>spL</sub></code> (carryover or C7+ loss). The advantage over the Hoffman plot is that both axes share the same conditions, so per-component K-value deviations show up at the right magnitude. The Hoffman plot mixes <code>p<sub>sp</sub></code> and <code>p<sub>sc</sub></code> on its two axes and obscures the size of the discrepancy.</li>
    <li><strong>Component material-balance plot.</strong> From <code>z<sub>i</sub> = β y<sub>i</sub> + (1 - β) x<sub>i</sub></code>, rearranging gives <code>y<sub>i</sub>/z<sub>i</sub> = m (x<sub>i</sub>/z<sub>i</sub>) + B</code> with <code>m = -(1 - β)/β</code> and <code>B = 1/β</code>, constrained to <code>m + B = 1</code>. The deviation between the lab-fit slope and the <code>β<sub>w</sub></code>-expected slope is a direct measure of the recombination-ratio error - useful for flagging field-metering or oil-property bias that the Hoffman plot cannot see.</li>
    <li><strong>Welltest-data nearest-sample workflow.</strong> Three operational scenarios for converting metered welltest GOR into a molar wellstream composition. Scenario 1 (only <code>R<sub>sp</sub></code> measured, no samples) and Scenario 2 (gas sample plus <code>R<sub>sp</sub></code>, no oil sample) draw the missing composition from a basin-wide lookup table of recent separator samples, keyed by producing GOR and constrained by an API-gravity match against the field measurement. ECM correction is applied to the synthesised pair. Scenario 3 is the standard two-sample baseline. The paper recommends operators maintain the lookup table with annual refresh and explicit matching rules for production zone, GOR range, and well proximity.</li>
    <li><strong>Four-source error taxonomy at the separator-sampling level.</strong> Leakage (bottles lose pressure in transit), carryover (oil droplets in the gas stream, gas bubbles in the oil stream), non-equilibrium sampling (separator gas and oil at different <code>T</code>/<code>p</code>), and chromatography errors. The non-equilibrium category includes the gas-bottle-heating-above-<code>T<sub>sp</sub></code> fallacy: some labs heat the gas bottle to revaporise condensed liquid, but constant-volume heating does not lift pressure proportionally and the bottle ends at saturated-gas conditions at higher T and lower p than intended. The ECM correction is agnostic to which of the four sources caused the inconsistency.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>From flag-only to correction.</strong> The Hoffman plot has been a diagnostic for seventy years. SPE-217328 is the first method that turns the diagnostic into a quantitative fix. The cost is a single flash calculation per sample, the precondition is a K-value source at separator conditions, and the result returns the wellstream composition to within 0.2 mol% under heavy synthetic errors.</p>
    <p><strong>Middle paper in the QC triptych.</strong> Younus-Whitson-Martinsen 2022 (SPE-211391) identifies and classifies GC-instrumentation errors via the gamma model. This paper corrects them. Nielsen-Wanat-Whitson 2024 (SPE-220699) propagates them forward through phase-behaviour calculations and demonstrates that recombination-GOR error dominates over all other compositional-uncertainty sources. The three together give the industry an end-to-end framework for separator-sample QC that did not exist before 2022.</p>
    <p><strong>Markus Hays Nielsen.</strong> Curtis's son. Petroleum engineer; M.Sc. (NTNU, ~2020) on the effect of binary interaction parameters on phase behaviour. Whitson AS engineer specialising in PVT-uncertainty and EOS-development methodology. Listed on the byline as M.H. Nielsen. The father-son co-authorship runs through the 2023-2025 series and into the four-generation lineage with Burgoyne in 2025.</p>
