- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Hoffmann, Crump &amp; Hocott (1953) — the Hoffman K-value plot, the seventy-year-old diagnostic this paper extends</li>
    <li>Fevang &amp; Whitson (1994) SPE-28829 — ECM framework for cross-sample reconstruction, now adapted to single-sample QC</li>
    <li>Standing (1979) — the low-pressure K-value correlation used for <code>p<sub>sp</sub> &lt; 1000</code> psia</li>
    <li>Whitson &amp; Torp (1981) SPE-10067 with Whitson &amp; Brule (2000) Monograph — modified Wilson equation with convergence pressure for higher-pressure K-value estimation</li>
    <li>Younus, Whitson &amp; Martinsen (2022) SPE-211391 — backward gamma-model QC of GC errors, the upstream paper in the QC triptych</li>
    <li>Whitson, Martinsen &amp; Younus (2022) Elsevier Chapter 2 — separator-gas sampling protocols and the four-step lab bottle-handling procedure</li>
    </ul>
  box_style: connections
