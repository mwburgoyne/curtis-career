- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Zick (1986) SPE-15493 — the condensing/vaporising mechanism that revolutionised miscible-gas EOR</li>
    <li>Zick (1993 personal communication to <mark>Whitson</mark>) — the multicell algorithm with distance-to-criticality criterion</li>
    <li><strong><mark>Whitson</mark> &amp; Belery (1994) SPE-28000</strong> — isothermal gravity/chemical equilibrium framework for compositional grading; the depth-dependent input to MMP calculation</li>
    <li>Hearn &amp; <mark>Whitson</mark> (1995) SPE-29115 — demonstrated that VGD fails in saturated two-phase systems; this paper shows enriched-gas C/V succeeds in that regime</li>
    <li><mark>Whitson</mark> (1983) SPE-12233 C7+ characterisation — the heavy-end framework feeding the EOS predictions across the depth interval</li>
    <li>Metcalfe-type multicell vaporisation models — the methodological antecedent the Zick algorithm replaces for C/V systems</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li><strong>Høier &amp; <mark>Whitson</mark> (2001) SPE-63085 "Compositional Grading - Theory and Practice"</strong> — the matured theoretical companion paper covering thermal-diffusion uncertainty, GOC sensitivity, and field case histories</li>
    <li><strong>Cheng, Høier &amp; <mark>Whitson</mark> (2004) SPE-90379</strong> — the third paper in the Høier compositional-grading series</li>
    <li><mark>Whitson</mark> &amp; Brule (2000) SPE Monograph "Phase Behavior", Chapter 8 — the gas-injection and miscibility chapter that consolidates the MMP-depth framework</li>
    <li><strong>Alavian-<mark>Whitson</mark> CO2-EOR series (IPTC-10641, SPE-125362, SPE-129666)</strong> — CO2 miscibility in depleted reservoirs follows the gas-zone branch of the MMP-depth framework</li>
    <li>Multicell MMP algorithms as the default in commercial PVT packages, with slimtube relegated to validation</li>
    <li>The enriched-gas slug-injection design pattern for depleted gas-condensate cycling projects</li>
    </ul>
