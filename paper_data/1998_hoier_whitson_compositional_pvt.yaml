- heading: Key Collaborators
  body_html: |-
    <p><strong>Lars Høier</strong> — NTNU PhD candidate working under Curtis through the 1990s. The 1998-2001-2004 compositional-grading series is his dissertation arc, with this 1998 paper as the application-first entry. The slug-injection result is one of the paper's standout practical contributions and reflects Høier's reservoir-engineering instinct as much as the theoretical framework.</p><p><strong>Aaron A. Zick</strong> — the multicell algorithm cited as a 1993 personal communication is the same Aaron Zick who introduced Curtis to the negative-flash construction over an Italian pizzeria dinner in Trondheim in November 1985. The 1985 dinner seeded what became the 1989 <mark>Whitson</mark>-Michelsen negative-flash paper; the 1993 communication seeded the multicell MMP algorithm validated here. Two foundational pieces of compositional reservoir engineering trace back to Curtis's collaboration with Zick.</p>
