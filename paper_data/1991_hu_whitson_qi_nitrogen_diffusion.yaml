sections:
- heading: Context
  body_html: |-
    <p>By 1990 the nitrogen injection programme at Ekofisk had become one of the most ambitious gas-EOR projects in the North Sea. Fina Exploration Norway funded an IFP core experiment in which a one-foot fractured-chalk core was exposed to a nitrogen stream across one face for 16 days at reservoir pressure and temperature. The question Curtis and Hu set out to answer: what are the actual transport mechanisms that move each component into and out of the matrix block, and can a compositional simulator reproduce them?</p><p>The paper is an unsolicited 21-page SPE manuscript - the same format as the earlier 1983 SPE-12518 - and reports a coupled analytical-fracture / numerical-matrix simulation framework. The interpretation reaches an answer that conventional Darcy-only intuition would miss.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Coupled analytical-fracture / numerical-matrix compositional model.</strong> In the fracture (the open space across the core face), the composition field is solved analytically from a steady convection-diffusion PDE. The single dominant Fourier mode is enough to give the component flux into the matrix face. In the matrix, a one-dimensional fully implicit compositional finite-difference solver couples Darcy flow (viscous and gravity), capillary pressure, and inter-phase molecular diffusion. The matrix Jacobian is <code>(2n<sub>c</sub>+2) x (2n<sub>c</sub>+2)</code> per grid block; the flash constraints can be used to reduce the working block to <code>n<sub>c</sub> x n<sub>c</sub></code>. Fully implicit treatment is mandatory because pressure gradients are very small while capillary and composition gradients are large; explicit or IMPES formulations are unstable.</li>
    <li><strong>IFT-scaled capillary-pressure correction.</strong> Laboratory capillary curves are measured at a single reference IFT but composition development drives the local IFT through factor-of-two changes during the experiment. The capillary curve must be rescaled cell-by-cell using Young-Laplace: <code>p<sub>c</sub> = p<sub>c</sub><sup>ref</sup> · σ / σ<sup>ref</sup></code>, with the local IFT computed from the Macleod-Sugden parachor relation. Without this correction the simulator overpredicts methane recovery (0.57 vs measured 0.37 at 16 days) and produces a monotonic gas-saturation profile - the opposite of the observed non-monotonic profile in which <code>S<sub>g</sub></code> decreases with depth near the top and then increases again toward the bottom.</li>
    <li><strong>Phase-saturation correction for effective porous-media diffusion.</strong> The inter-block diffusive transmissibility uses <code>f<sub>ps</sub> = min(S<sub>pj</sub>, S<sub>pn</sub>)</code> - the smaller of the two connected blocks' phase saturations - to shut off diffusion when one block has zero phase saturation. Arithmetic or harmonic means produce unphysical transmission through a phase that does not exist in one of the blocks.</li>
    <li><strong>Component-by-component recovery-mechanism decomposition.</strong> The headline result. Each component in the N<sub>2</sub>/C<sub>1</sub>/C<sub>5</sub> mixture moves by a different combination of mechanisms:
        <ul>
    <li><strong>Nitrogen:</strong> early-time transport into the core is almost pure gas-phase molecular diffusion. As N<sub>2</sub> accumulates, gas-phase Darcy flow becomes comparable. In the oil phase, N<sub>2</sub> diffuses downward against the net oil-phase Darcy flow - Darcy direction and diffusion direction need not agree even for the same component.</li>
    <li><strong>Methane:</strong> the upward C<sub>1</sub> flux out of the core is almost entirely gas-phase molecular diffusion. Gas-phase Darcy flow is <em>downward</em> in most of the core - reversed relative to gravity by the IFT-driven capillary gradient. Diffusion dominates the recovery and opposes Darcy transport. Switching off intra-core diffusion (retaining only the fracture-face diffusion) collapses methane recovery from the matched 38% at 16 days to 5%.</li>
    <li><strong>Pentane:</strong> oil-phase Darcy flow upward dominates recovery. The C<sub>5</sub> diffusive flux in oil is downward and is compensated by upward oil convection so that local phase equilibrium is maintained.</li>
    </ul>
    </li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The four-forces argument.</strong> The paper is essentially a plea for treating viscous, gravity, capillary, and diffusion forces with equal weight in compositional simulators. Reservoir engineers trained on Darcy-dominant intuition routinely miss that the sign of the Darcy velocity can be opposite to the sign of the diffusive flux for the same component in the same phase, because the driver of Darcy flow (pressure gradient including capillary and gravity) and the driver of diffusion (composition gradient) are independent physical forces.</p>
    <p><strong>The Ekofisk programme.</strong> The motivation in Curtis's voice: in fractured reservoirs like Ekofisk, the matrix blocks hold most of the fluid but the fractures carry the flow. The diffusion-driven recovery channel into and out of the matrix is what gas-EOR projects at Ekofisk needed to size correctly. The Riazi-Whitson 1993 IECR diffusion-coefficient paper supplies the input correlations that this 1991 simulator consumes; the Christoffersen-Whitson 1994 SPE-26673 capillary-pressure work supplies the complementary laboratory protocol. Three papers together form the early-1990s Whitson framework for nitrogen-EOR PVT in chalk.</p>
  box_style: influence
- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Riazi &amp; Whitson (1993) IECR - bulk-fluid diffusion-coefficient correlations (input to the simulator)</li>
    <li>Reid-Sherwood diffusion correlations (1977)</li>
    <li>Lohrenz-Bray-Clark (1964) - phase viscosity</li>
    <li>Soave (1972) modified Redlich-Kwong EOS - phase equilibrium</li>
    <li>Macleod (1923) and Sugden (1924) parachor relation - composition-dependent IFT</li>
    <li>Young-Laplace - capillary pressure / IFT scaling</li>
    <li>Whitson-Soreide (1989) capillary-flash work - shows VLE is insensitive to <code>p<sub>c</sub></code> even in chalk; complement here is the demonstration that IFT-varying <code>p<sub>c</sub></code> has a large effect on <em>flow</em></li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Christoffersen-Whitson (1994) SPE-26673 - the capillary-pressure work that sits alongside this diffusion work for the Ekofisk PVT programme</li>
    <li>Riazi-Whitson (1993) IECR diffusion paper - reuses the framework here for the bulk-coefficient validation</li>
    <li>Operator nitrogen-EOR programmes that need diffusion treated with equal weight to Darcy flow</li>
    <li>Compositional simulator developers who treated the matrix-fracture transfer as a Darcy-dominated process - this paper is one of the early demonstrations that diffusion-dominated transfer is not a special case but the standard mode for some components</li>
    <li>Whitson-Brule (2000) SPE Monograph treatment of EOR PVT</li>
    </ul>
  box_style: connections
- heading: Key Collaborators
  body_html: |-
    <p><strong>H. Hu</strong> — Visiting researcher; Norwegian Institute of Technology connection during the 1989-1991 nitrogen-diffusion programme.</p><p><strong>Y. Qi</strong> — Norwegian Institute of Technology, co-investigator on the Ekofisk nitrogen programme.</p><p><strong>Fina Exploration Norway</strong> — project funder. Fina (later Total) operated Ekofisk-related assets in the early 1990s. The 1994 Whitson-Belery SPE-28000 paper on compositional grading was the further fruit of the Fina collaboration with Paul Belery.</p>
