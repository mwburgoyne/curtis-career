sections:
- heading: Context
  body_html: |-
    <p>Methodology-consolidation paper that gathers the three previously scattered wellstream-prediction approaches (Hoda-Whitson 2013 production-data tracking, Whitson-Sunjerga 2012 variable-FBHP PVT tuning, and Carlsen-Whitson 2019 URTeC-539 two-mode tracking) into a single tiered framework, then adds a novel no-regression Method 3 on top. Co-authored by three Whitson AS senior engineers with Curtis as the academic anchor. The paper is essentially the operational answer to a recurring question from operators using the Whitson-Sunjerga LRS framework: <em>given the data we actually have on this well today, which compositional-tracking calculation should we be running?</em></p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Three-tier method hierarchy keyed to data availability.</strong> Methods 1, 2, and 3 are positioned not as competing alternatives but as the three rungs of a single ladder, each representing the best one can do given that day's data:
        <ul>
    <li><em>Method 1 (production data only)</em>: Hoda-Whitson 2013 kernel. Needs separator GOR plus separator conditions only. Uses the most-recent welltest as seed feed and flashes through measured separator conditions. Cost: zero.</li>
    <li><em>Method 2 (limited welltest)</em>: Whitson-Sunjerga 2012 kernel. Needs separator-gas compositions plus stock-tank API plus separator conditions. <em>N</em>+2-unknown PhazeComp regression. Cost: ~200-800 USD per welltest.</li>
    <li><em>Method 3 (extensive welltest, novel)</em>: needs measured separator-oil AND separator-gas compositions plus <code>MW<sub>o,C7+</sub></code>. No regression. Cost: ~1000-3000 USD per welltest.</li>
    </ul>
        All three share a single field-wide EOS as common backbone. A well uses Method 3 on welltest days (1-3 per year), Method 2 on intermediate days with gas compositions only, and Method 1 on all remaining days.</li>
    <li><strong>Method 3 direct-recombination wellstream prediction.</strong> Standard molar material balance <code>z<sub>i</sub> = y<sub>i</sub> F<sub>g</sub> + x<sub>i</sub> (1 - F<sub>g</sub>)</code> with <code>F<sub>g</sub></code> calculated from measured GOR and EOS-evaluated separator-phase molar volumes. With both separator phases measured rather than inferred, the system is determined and no regression is needed. Validated across four fluid types (black oil <code>R<sub>s</sub></code>=326, volatile oil 1589, near-critical 3938, gas condensate 5714 scf/STB): predictions sit within line thickness of the actual simulated values across all four. The operational caveat is that lab-reported <code>MW<sub>o,C7+</sub></code> is essential; modern PVT-lab practice of substituting extended GC with assumed SCN MWs undermines the regression-free property and degrades the method to Method 2 territory.</li>
    <li><strong>R<sub>p</sub>-γ<sub>API</sub> curve smoothing as a Method-1.5 intermediate.</strong> Method 1 produces stepwise plateaus in predicted API between welltests (because the seed feed implicitly fixes a constant <code>γ<sub>API</sub></code> until the next sample). The fix is a surface-process-normalised <code>R<sub>p</sub>-γ<sub>API</sub></code> curve generated by compositional reservoir simulation or CVD simulation, then used to drive a 2-unknown daily regression (<code>F<sub>g</sub>, M<sub>C7+</sub></code>) against the 2 daily knowns (<code>R<sub>p,sep</sub>, γ<sub>API</sub></code>). Smoothly varying daily API and C<sub>7+</sub> MW emerge between welltests, with no separator-gas composition required - that is the Method-1.5 bridge between Methods 1 and 2.</li>
    <li><strong>Seed-feed accuracy is fluid-type-specific.</strong> Corrects a nuance in Hoda-Whitson 2013's seed-feed-insensitivity claim. With seed feed updated on day 1 only and Method 1 run forward: black oils stay accurate over time, volatile oils drift, near-critical volatile oils and gas condensates drift substantially because <code>MW<sub>C7+</sub></code> and <code>γ<sub>API</sub></code> change with depletion. The cost of stale seed feed scales with fluid type, which is exactly why the higher tiers of the hierarchy matter for the leaner end of the fluid spectrum.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The compositional-tracking palette, not menu.</strong> The framing carries the engineering judgement that operators most need: do not pick one method, blend them along the data-density axis. Method 3 on welltest days, Method 2 in between if gas compositions are available, Method 1 elsewhere, with the higher-tier output seeding the lower-tier calculation. The hierarchy is what made earlier Whitson-group output operational across the modern unconventional fleet, where data density per well varies day to day rather than holding constant.</p>
    <p><strong>Field-wide EOS as the common backbone.</strong> The three methods differ only in what daily measurements drive the calculation, not in the EOS itself. This makes Method 1, 2, 3 internally consistent and lets the same predicted wellstream composition feed reservoir simulation, surface-process modelling, and reserves reporting without re-tuning per method. The Field-Wide EOS concept (Younus et al. URTeC-551, the companion paper) becomes load-bearing precisely because the compositional-tracking hierarchy in this paper rests on it.</p>
    <p><strong>The MW<sub>o,C7+</sub> reporting recommendation.</strong> A small operational instruction with outsized consequence: ask the PVT lab to report measured separator-oil C<sub>7+</sub> molecular weight. Without it Method 3 loses its regression-free property; with it Method 3 reaches "within line thickness" accuracy. The paper's most quotable line is the explicit ask of the labs.</p>
