sections:
- heading: Context
  body_html: |-
    <p>Methodology paper introducing a systematic, quantitative procedure to identify and correct individual-sample laboratory C<sub>7+</sub> compositional errors using an already-developed field-wide gamma distribution model. Where Younus et al. 2019 URTeC-551 covered the <em>development</em> of a field-wide gamma model, this 2022 ADIPEC paper addresses the <em>QC of new samples</em> against that model. Validated on 50+ public Duvernay-basin PVT samples spanning a decade across several PVT labs. The paper's own claim: "to our knowledge, this is the first attempt to identify and deal with composition errors with a systematic and comprehensive workflow."</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Four-source GC compositional-uncertainty taxonomy.</strong> (a) Baseline shift (BS) in gas chromatography; (b) internal standard (IS) error; (c) component molecular-weight error; (d) GOR-recombination error. Composite effect: &plusmn;0.2-2 mol% errors in methane and C<sub>7+</sub> per Mawlod et al. 2021. Formal error definitions: <code>E<sub>IS</sub> = A<sub>t</sub><sup>lab</sup> / A<sub>t</sub><sup>correct</sup> - 1</code>; <code>E<sub>BS</sub></code> as a sliding-baseline area offset; parameter <code>C<sub>x</sub></code> = the first SCN fraction where errors begin (typically beyond C<sub>15</sub>).</li>
    <li><strong>Gamma-model GC QC workflow with C<sub>x</sub> diagnostic plot.</strong> Procedure using the field-wide gamma model (fixed <code>&alpha;</code>, <code>&eta;</code>, <code>M<sub>Li</sub></code>) with sample-specific <code>M<sub>7+</sub></code> and <code>C<sub>x+</sub></code> multiplier as two regression variables. Starts with <code>C<sub>x</sub> = C<sub>N+</sub></code>, classifies the sample as (i) no-error, (ii) IS-only (mismatch only in C<sub>N+</sub>), or (iii) BS-only-or-combined (mismatch for some <code>C<sub>x</sub> &lt; C<sub>N+</sub></code>). The C<sub>x</sub> diagnostic plot of C<sub>15-</sub> deviation plus total calculated mass vs trial <code>C<sub>x</sub></code> identifies the correct <code>C<sub>x</sub></code> as the heaviest SCN with minimum C<sub>15-</sub> deviation; the total-calculated-mass value at that <code>C<sub>x</sub></code> distinguishes BS-only (&asymp; 1) from combined IS+BS (&ne; 1).</li>
    <li><strong>Post-QC sample-specific EOS-tuning variables V<sub>M7+</sub> and V<sub>N+</sub>.</strong> Two regression knobs introduced after the gamma-model QC. <code>V<sub>M7+</sub></code> on C<sub>7+</sub> average MW impacts the mass distribution of all C<sub>7+</sub> components; <code>V<sub>N+</sub></code> is a multiplier on the C<sub>N+</sub> amount (mass or mole). Typical <code>V<sub>M7+</sub></code> adjustment under 5% for good-quality samples; can be larger for flagged samples. Allows iterative EOS tuning where sample-specific uncertainties in C<sub>15-</sub> distribution and the C<sub>N+</sub> integration-to-infinity residual are absorbed by these two knobs rather than perturbing the field-wide gamma parameters.</li>
    </ul>
- heading: Significance and Contribution
  box_style: influence
  body_html: |-
    <p><strong>Lab-QC at scale via the field-wide model.</strong> The 2019 URTeC-551 field-wide EOS gave operators a single basin-scale fluid model; this paper closes the loop by giving them a quantitative tool to QC each new sample's GC against that model. Outliers are classified into IS, BS, or combined errors with the C<sub>x</sub> diagnostic plot, and the two-knob EOS-tuning recipe absorbs residual sample-specific uncertainty without compromising the field-wide gamma framework.</p>
    <p><strong>Named errors are addressable errors.</strong> Curtis's pattern across forty years: define the failure mode, name its parameters, give the diagnostic plot, then the recipe. Same approach as the 1983 SPE-12233 C<sub>7+</sub> characterisation, the 1996 Fevang-Whitson three-region GCB, and the 2000 monograph's PVT-data QC chapters. The four-source taxonomy makes lab-side error attribution tractable for operators who previously had no way to challenge a vendor's GC report.</p>
    <p><strong>Duvernay validation across labs and across a decade.</strong> 50+ public samples, several PVT labs, ten-year span. That breadth of validation makes the workflow defensible across the unconventional fleet rather than being a one-basin trick.</p>
