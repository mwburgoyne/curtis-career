sections:
- heading: Context
  body_html: |-
    <p>Alqahtani is a King Saud University PhD student on sabbatical at NTNU under Curtis's supervision. The paper reports a novel systematic observation: in most equilibrium systems of petroleum mixtures, the <em>molar distribution shape</em> of the heavier fractions (C7+) is very similar between the equilibrium phases. The gamma distribution shape parameter α is the quantitative similarity metric. The observation is verified across three classes of equilibrium condition: P-T phase envelope (saturation loci), two-phase flash within the envelope, and isothermal gravitational segregation (compositional gradient calculations). Single base example: the Hoffman-Crump-Hocott (1953) saturated gas-oil reservoir fluid system fit with a gamma distribution yielding M7+ = 201.3, η = 81.27, α = 1.933. SRK EOS with zero hydrocarbon BIPs and default PhazeComp Twu-correlated C7+ characterisation.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Gamma-shape invariance principle for equilibrium phases.</strong> The headline finding. In most equilibrium systems of conventional petroleum mixtures, the gamma shape <code>α</code> of equilibrium phases is approximately invariant and very close to the feed shape. Verified across three classes:
        <ul>
    <li>P-T phase envelope across the reservoir T range (59-770 °F): incipient-gas <code>α<sub>g</sub></code> = 1.892-1.930 at bubblepoints; incipient-oil <code>α<sub>o</sub></code> = 1.939-2.031 at upper dewpoints across the retrograde portion (788-842 °F). Both close to feed <code>α</code> = 1.933.</li>
    <li>Two-phase flash at T = 212 °F across pressure: above ~500 psia both flash phases have shape within ±0.05 of feed; in the 1,000-3,100 psia range, within ±0.02.</li>
    <li>Isothermal gravitational segregation across 4,000-10,000 ft for a near-critical saturated gas-oil contact (GOC) with 400 psi undersaturation at reference depth: <code>α</code> varies from 1.907 (top gas) to 1.989 (bottom oil) against feed 1.933 - a quantitatively surprising finding for near-critical systems known to exhibit dramatic compositional variation.</li>
    </ul></li>
    <li><strong>Breakdown rule when K-values for light-heavy C7-C11 components exceed ~10.</strong> Invariance fails when K-values for one or more light-heavy fractions exceed ~10 (typically at high T and very low p conditions), because in this regime the abundant light-heavy C7+ fractions preferentially partition to the gas phase and distort the oil-phase distribution. Provides a quantitative guard rail for practitioners applying the invariance principle: if the operating conditions push K(C7-C11) above 10, the assumption breaks.</li>
    <li><strong>Near-critical saturated gradient worked example.</strong> The most stringent test of the invariance principle. Near-critical saturated GOC with 400 psi undersaturation at reference depth, spanning ~6 gas and oil zones over 4,000-10,000 ft. Despite dramatic spatial composition variation, <code>α</code> remains within ~5% of feed. The result is more striking than the static-flash and saturation-envelope results because near-critical systems are conventionally expected to exhibit large equilibrium-phase property contrasts.</li>
    <li><strong>Operational application: a single measured phase suffices to infer the C7+ shape of an unsampled equilibrium phase.</strong> The practical pay-off. For an un-sampled gas cap, a pipeline gas with unmeasurable C7+, or any equilibrium phase that resists direct measurement, the C7+ molar-distribution shape can be inferred from the adjacent (sampled) phase by holding <code>α</code> and <code>η</code> at the measured values and regressing only <code>M<sub>n+</sub></code>. The reservoir engineer recovers a full PVT description from one sample where two would otherwise be needed.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>An empirical principle that quietly changes practice.</strong> Curtis's teaching pattern: a systematic observation across many cases (here, three classes of equilibrium condition all showing the same near-invariance) can change daily PVT-engineering practice without any new mathematics. The invariance principle does not depend on any tuning or fitting - it is a property of the gamma family combined with conventional petroleum K-value behaviour. The K-value-above-10 breakdown rule is the right kind of guard rail: simple, operationally checkable, and physically grounded.</p>
    <p><strong>The right kind of validation set.</strong> Three equilibrium classes, six T-depth zones in the gradient case, and the Hoffman-Crump-Hocott 1953 reference fluid that has been the test bench for compositional reservoir engineering for 65 years. The choice of validation base is itself important - it links the result to the existing body of equilibrium-flash literature that practitioners know.</p>
    <p><strong>Recovering an unsampled phase.</strong> The practical application matters most in unconventional settings where in-situ representative sampling is hard and the produced phase is what the laboratory sees. If the C7+ shape transfers from measured to unmeasured phases, the EOS practitioner can build a defensible compositional description for the in-situ phase without having to argue for additional sampling that may not be operationally feasible.</p>
