sections:
- heading: Context
  body_html: |-
    <p>An open integrated asset management (IAM) benchmark - the first of its kind in the literature - that any IAM platform can implement and any optimisation algorithm can be tested against. Curtis founded Petrostreamz in 2006 for the Pipe-It workflow software; this paper is one of the public-domain demonstrations of the Pipe-It stack (SENSOR reservoir simulator, Streamz process module, Pipe-It integration with Nelder-Mead Simplex optimiser). The motivation: published IAM case studies (Bailey 2005, Cullick 2003) are typically proprietary and do not permit cross-framework comparison. Without a shared benchmark, "our IAM framework is best" is unfalsifiable marketing.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>The benchmark itself: two gas-condensate reservoirs + 4-stage separator + dew-point-controller + NPV.</strong> Two SPE-3-derived sector reservoir models (lean and rich gas condensates with the Arco 9-component EOS, differing initial composition and permeability distribution). Process: 4-stage separator (56.2 to 1.01 bara) plus a dew-point controller (DPC, a variable-temperature separator from 27°C down to -57°C). DPC gas is split between sales and injection; injection is split between lean and rich reservoirs. NPV with price escalation, discount factor, CO<sub>2</sub>-content penalty, and DPC capital cost that scales with cooling duty. Four optimisation variables: <code>f<sub>g</sub></code> (total injection fraction), <code>f<sub>gl</sub></code> (lean-reservoir injection fraction), <code>t<sub>i</sub></code> (injection end time), <code>T<sub>DPC</sub></code>. Optimisation lifts NPV ~10% over the base case.</li>
    <li><strong>Coupling error scales with project time step <code>Δt<sub>P</sub></code> and inversely with sub-divisions <code>N<sub>s</sub></code>.</strong> At each project time step boundary the reservoir simulators produce well streams, the streams are combined and processed for the surface facility, and the updated injection composition and rate are fed back. Between boundaries the injection is held constant (step-hold approximation) while the actual reservoir streams vary continuously - the coupling error. Three strategies to reduce the error: smaller <code>Δt<sub>P</sub></code>, sub-division averaging over <code>N<sub>s</sub></code> sub-intervals per project step (post-processing on reservoir output, no extra simulator calls), and finer reservoir-simulator output frequency. Recommended operating point for this benchmark: <code>Δt<sub>P</sub> = 1,000</code> days with <code>N<sub>s</sub> = 100</code> divisions gives less than 0.5% NPV error. The diagnostic ask for any IAM vendor: at what <code>Δt<sub>P</sub></code> and with how many <code>N<sub>s</sub></code>?</li>
    <li><strong>IAM NPV objectives are multi-modal and often degenerate; 1-D parameter analysis is essential.</strong> The 4-D NPV objective shows two non-standard behaviours. (1) <strong>Multi-modality</strong>: NPV vs DPC temperature has two local maxima at the bounds (27°C and -57°C) with a minimum in the interior. A simplex starting near the interior minimum can converge to the wrong maximum. The boundary maxima come from DPC capital cost going to zero at either extreme of cooling duty. (2) <strong>Degenerate optimum along a line</strong>: NPV vs <code>(f<sub>g</sub>, f<sub>gl</sub>)</code> has a constant maximum along a line in the <code>f<sub>g</sub></code>-<code>f<sub>gl</sub></code> plane. Multiple combinations give the same optimal NPV. A derivative-based solver stalls at a flat ridge; a simplex finds one optimum along the ridge but cannot identify it as a family. Recommendation: 1-D parameter sweeps for each variable before automated optimisation - cheap insurance against non-convex pathology.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The first open IAM benchmark.</strong> Provides a common ground-truth for comparing integration platforms (Pipe-It, POSC, OpenIAM) and optimisation algorithms (Nelder-Mead, simulated annealing, genetic, NLP). IAM is a software-systems problem before it is an engineering problem; without a shared benchmark, vendor claims about integration quality cannot be falsified.</p>
    <p><strong>The Curtis-Petrostreamz lineage.</strong> Petrostreamz (founded 2006 by Curtis, sold to Tieto in 2018) was built around Pipe-It and the Streamz I/O conversion engine. This 2009 paper is the first public-domain technical demonstration of the Pipe-It stack on a published benchmark.</p>
    <p><strong>The "1-D before optimisation" discipline.</strong> Curtis's framing: the standard engineering instinct is "let the optimiser find the optimum", but IAM objectives are designed to be non-convex by their boundary economics (CAPEX penalty at low cooling duty, tariff jumps at gas specification limits, process-design discontinuities). 1-D parameter plots are a diagnostic about the problem, not a computational shortcut.</p>
