- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Coats, Whitson &amp; Thomas (2004) SPE-90390 - the apparent-vs-physical dispersivity distinction for multi-well floods</li>
    <li>Bear (1988a) - analytical injection-phase solution for radial source/sink (extended here to the production phase)</li>
    <li>Aronofsky &amp; Heller (1957) - the 1-D convection-dispersion solution against which apparent dispersivity is fit</li>
    <li>Pickens &amp; Grisak (1981) - the canonical aquifer push-pull dataset</li>
    <li>Arya et al. (1988), Mahadevan et al. (2002) - literature compilations of apparent dispersivity vs travel length</li>
    <li>Perkins &amp; Johnston (1963) - reference physical dispersivity for unconsolidated sandpacks</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Groundwater-hydrology and CO<sub>2</sub>-storage tracer-test interpretation - direct deterministic alternative to fitted dispersion models</li>
    <li>Reservoir-engineering simulation-input recommendations: use physical dispersivity (~0.01 ft) rather than apparent fitted values as simulator input</li>
    <li>Single-well chemical tracer test analysis for residual-oil-saturation determination in IOR projects</li>
    <li>2010 follow-up paper Johnsen-Whitson TIPM second push-pull paper (extends the framework)</li>
    <li>Operator tracer-test interpretation workflows in stratified reservoirs</li>
    </ul>
