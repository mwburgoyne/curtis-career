- heading: Key Collaborator
  body_html: |-
    <p><strong>Sverre Gullikstad Johnsen</strong> — NTNU PhD graduate (2007) with Curtis as co-supervisor. Two TIPM papers with Curtis on push-pull tracer test analysis. Subsequent career in computational fluid dynamics and porous-media flow at SINTEF.</p>
