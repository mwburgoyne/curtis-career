sections:
- heading: Context
  body_html: |-
    <p>Sverre Gullikstad Johnsen's NTNU PhD work with Curtis as co-supervisor. The paper extends the Coats-Whitson-Thomas 2004 SPE-90390 argument - that apparent dispersivity in reservoir simulation is a conformance-fitting artefact, not a physical rock property - from multi-well pattern flood geometry to single-well push-pull (injection-then-withdrawal, "echo") tracer tests. The validation case is the Pickens-Grisak 1981 aquifer field data, which had been the canonical reference for "scale-dependent dispersivity" in groundwater hydrology for two decades. Johnsen and Whitson reproduce the Pickens-Grisak SW1 and SW2 effluent profiles without parameter fitting, using only the reported layer conductivities and the regional groundwater drift.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Semi-analytical streamline model for single-well push-pull echo tests combining uniform drift and layered source/sink.</strong> The total velocity field for layer <em>j</em> superimposes a radial source/sink (injection / production at the well) on a uniform natural-drift velocity. The corresponding stream function defines injection-phase streamlines and connects them to production-phase streamlines through a closed-form relation. For each injection streamline the algorithm integrates forward to the switch-over time to find the maximum radial advancement, then back to the well to find the streamline-specific breakthrough time. The producing tracer concentration is the ratio of streamlines still producing injectant to all producing streamlines. The model is fully analytical (no numerical dispersion), assumes zero physical dispersivity, miscible incompressible ideal tracer, no cross-flow between layers, and steady-state radial injection / production with instantaneous switch-over.</li>
    <li><strong>Natural drift alone produces linear scale-dependency of apparent dispersivity in single-well push-pull tests.</strong> Drift distorts the injected fluid's covered area from a circle into a downstream-skewed shape. Upstream injectant has both a shorter travel distance and a higher production-phase velocity (breaks through earlier); downstream injectant travels farther and returns more slowly. This geometric asymmetry produces a smeared production profile <em>even though no fluid actually mixes anywhere in the aquifer</em>. Fitting the 1-D Aronofsky-Heller convection-dispersion solution to the drift-only profile gives apparent dispersivities that grow with travel length on a log-log plot with slope ~1 - the same empirical linear scale-dependency reported by Arya et al. 1988 and Mahadevan et al. 2002 from literature echo-test compilations. The widely-observed scale-dependent dispersivity is a conformance artefact driven by drift, not a scale-dependent rock property. Physical dispersivity remains about 0.001 ft for unconsolidated sandpacks (Perkins-Johnston 1963), orders of magnitude below the apparent values at field scale.</li>
    <li><strong>Stratification plus drift reproduces Pickens-Grisak SW1 and SW2 field data without parameter fitting.</strong> The Pickens-Grisak 1981 push-pull tests in a stratified Canadian sand aquifer (b = 8.2 m, φ = 0.38, mean hydraulic conductivity about 14.8 darcy, hydraulic head gradient 0.052 kPa/m, drift velocity 0.17 m/day) are reproduced by the streamline model using only the reported layer conductivities and head gradient as inputs. The SW1 effluent profile (76.55 m<sup>3</sup>/day for 1.25 days injection then 2 days production) matches within measurement scatter. The harder SW2 case (62.12 m<sup>3</sup>/day for 3.93 days, 52.36 m<sup>3</sup>/day for 16.9 days) shows oscillatory "shoulder" features in the field data that the multi-layer model reproduces deterministically - upstream high-permeability layers break through early and contribute different layer-mobility-ratio weightings than downstream low-permeability layers. The single-layer model produces a smooth profile; the field data shows kinks; the multi-layer model reproduces the kinks without tuning. Agreement with commercial streamline (3DSL) and finite-difference (SENSOR) simulators run with identical inputs is exact, except near breakthrough where the commercial codes' numerical dispersion smears the analytical solution.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>Extending the conformance argument to single-well tests.</strong> The Coats-Whitson-Thomas 2004 SPE-90390 paper had argued that apparent dispersivity in multi-well miscible floods was a conformance-fitting artefact rather than a rock property. The 2008 Johnsen-Whitson paper extends the argument to single-well push-pull geometry and identifies natural groundwater drift as the previously-overlooked conformance mechanism. Together the two papers cover the two principal geometries where the apparent-dispersivity-as-scale-dependent-rock-property fallacy had been entrenched.</p>
    <p><strong>The SW2 shoulder reproduction is the teaching money-shot.</strong> Field practitioners typically attribute the SW2 oscillatory features to "heterogeneity" in a vague qualitative sense. Johnsen-Whitson 2008 shows the exact mechanism - upstream high-<code>k</code> breakthrough plus downstream drift-carried arrivals - reproduced deterministically from known inputs. The teaching pattern: when a field push-pull profile shows unexpected sharp curvature changes, the first question is "which layers and which drift direction", not "what dispersion model fits".</p>
    <p><strong>Numerical-dispersion-free benchmark.</strong> The semi-analytical solution runs in a fraction of the time of commercial simulators and carries no numerical dispersion. It becomes the reference against which commercial tracer-test interpretation can be calibrated.</p>
