sections:
- heading: Context
  body_html: |-
    <p>Curtis-first-author prospectus paper - explicitly a call-to-arms for multi-disciplinary collaboration on well-box-scale fluid-rock heterogeneity characterisation in liquid-rich shale (LRS). The abstract states the intent directly: "The main purpose of our paper is to prompt a discussion about the potential impact of in-situ spatial fluid heterogeneity and permeability distribution on producing GOR performance and ultimate EURs of oil, condensate, and gas. Given the little (if any) existing studies on this subject, we hope that this paper will forge a multi-disciplinary alliance...". Technical content is a framework and vocabulary proposal rather than novel quantitative methods, but the three core ideas have shaped subsequent NTNU and whitson LRS work. Alqahtani is the KSU PhD candidate on sabbatical at NTNU (also co-author of SPE-190797 in the same year); Chuparova brings shale-geochemistry specialism.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Well-box concept, dimensional envelope, and "complete-recovery" fraction regime classification.</strong> The vocabulary contribution. The <em>well-box</em> is defined as the drainage volume of a horizontal multiple-fracture unconventional well over its 10-50 year life span - a scale between the single hydraulic fracture (10-100 ft) and the basin (10s of miles). Dimensional envelope: lateral wellbore 1-2 miles (5,000-10,000 ft); fracture height 100-1,000 ft; tip-to-tip lateral fracture reach 100-1,000 ft; bulk volume 10-500 million bbl of rock; hydrocarbon pore volume 0.5-50 million bbl at 5-10% porosity; total fracture surface area 100,000 to 50 million ft<sup>2</sup>. "Complete-recovery" benchmarks: dry gas 50-80% of initial-gas-in-place; gas condensate 5-30% of initial-condensate-in-place; oil with solution-gas drive 10-20% of initial-oil-in-place. The well-box is the smallest spatial scale at which fluid-rock heterogeneity can plausibly produce observable well-level performance differences - smaller heterogeneities are mobility-averaged away in the producing wellstream.</li>
    <li><strong>Parasequence-based fluid heterogeneity architecture hypothesis with Dykstra-Parsons-generalised statistical framework.</strong> The geological hypothesis. From shale geology and geochemistry, the most-plausible well-box heterogeneity structure is <em>vertical</em> fluid-composition variation tied to parasequence stacking plus <em>lateral</em> permeability and porosity heterogeneity within each parasequence. Captured statistically via log-normal permeability (Dykstra-Parsons <code>V<sub>k</sub></code>), normal porosity <code>V<sub>φ</sub></code>, and normal initial solution OGR <code>V<sub>r,i</sub></code>, with four canonical correlation scenarios: uncorrelated, fully-correlated, k-φ correlated with <code>r<sub>i</sub></code> independent, and uniform k-φ with <code>r<sub>i</sub></code> random. This generalises classical Dykstra-Parsons reservoir-heterogeneity treatment to the fluid-composition dimension.</li>
    <li><strong>OGR(t) similarity-screening methodology for identifying most-probable well-box heterogeneity realisations.</strong> The diagnostic proposal. Monte Carlo over the heterogeneity model family; selection of realisations sharing a similar initial producing wellstream OGR with measured wells; comparison of their forecast OGR(t) behaviour against measured OGR(t) of wells with the same initial OGR in the same basin. The closest-matching realisations are the most-probable underlying heterogeneity structures. The method does not need fluid samples beyond initial-condition recombination - it leverages the high information content of the OGR-time curve itself.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>Vocabulary that shapes subsequent work.</strong> Curtis's teaching pattern in this paper: when an emerging area lacks shared vocabulary, name the right scale and let the name organise subsequent research. The well-box scale - bigger than a fracture, smaller than a basin, defined operationally by the well's lifetime drainage - has carried into the Mydland-Whitson, Carlsen-Whitson, and Younus-Whitson papers as the standard frame for LRS heterogeneity discussion. The dimensional envelope and recovery-fraction benchmarks give practitioners default values to argue with when their fields fall outside the listed ranges.</p>
    <p><strong>The call-to-arms framing.</strong></p>
    <blockquote>The main purpose of our paper is to prompt a discussion about the potential impact of in-situ spatial fluid heterogeneity and permeability distribution on producing GOR performance and ultimate EURs of oil, condensate, and gas.</blockquote>
    <p>Honest about being a prospectus rather than a finished study. The paper does not solve the heterogeneity-quantification problem; it names it, proposes a vocabulary, and offers a screening methodology that future work can validate. This is a different kind of contribution than the Whitson-Sunjerga 2012 or Juell-Whitson 2013 papers, but useful in a different way: it shapes the question rather than the answer.</p>
    <p><strong>OGR similarity screening as a bridge between sparse PVT data and rich production data.</strong> The methodology takes advantage of the basin-wide imbalance between PVT samples (50-100 across a play) and production curves (thousands of wells). If the OGR-time signature is heterogeneity-discriminating, the production data carry usable heterogeneity information without additional sampling. Worth quantitative testing in follow-on work.</p>
