- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Zick (1993, personal communication) - the unpublished multicell multicontact algorithm that produces the correct CV-mechanism MMP</li>
    <li>Luks et al. (1987) and Jensen &amp; Michelsen (1987) - the static single-cell multicontact MMP algorithms being critiqued</li>
    <li>Whitson-Anderson-Søreide (1989-1990) C<sub>7+</sub> framework - the basis for the 15-component Safah EOS characterisation</li>
    <li>Whitson (1992) HOT Forum pseudoisation - the 15 → 8 component reduction for the Safah simulator</li>
    <li>Whitson-Michelsen (1989) negative flash - the underlying flash machinery</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Whitson-Brule (2000) SPE Monograph Chapter 8 - the CV-mechanism diagnostic and the algorithm-overprediction warning become canonical</li>
    <li>Alavian-Whitson CO<sub>2</sub>-EOR series (2005-2010) - the mechanism-identification practice from this paper carries forward</li>
    <li>Operator MMP-design protocols in rich-gas miscible projects where the CV mechanism is in play</li>
    <li>Commercial MMP software products that subsequently incorporated multicell multicontact methods after Zick's algorithm became more widely available</li>
    <li>Pillars of Technology (SPE TWA 2009) - Curtis lists CV-mechanism MMP among the "corrections that became standard" once Zick made them computable</li>
    </ul>
