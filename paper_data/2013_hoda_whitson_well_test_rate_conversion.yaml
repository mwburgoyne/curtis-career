- heading: Key Collaborator
  body_html: |-
    <p><strong>Mohammad Faizul (Faiz) Hoda</strong> — Petrostreamz / whitson, then NTNU. Originator of the 2002 BOz delumping method. Software architect for the Pipe-It / Streamz IAM stack. Co-author with Curtis on Juell-Whitson-Hoda 2009 SPE-121252 IAM benchmark, Kuntadi-Whitson-Hoda 2012 SPE-159400 dynamic delumping, and this paper. Three-paper sequence completing the simulator-side and measurement-side stream-conversion stack.</p>
