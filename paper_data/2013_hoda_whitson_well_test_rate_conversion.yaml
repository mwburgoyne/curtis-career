- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Standard wellstream-composition-from-recombined-samples method (Whitson SPE Monograph 2000, Chapter 6)</li>
    <li>Wilson K-value equation - the original weak-composition-dependency principle</li>
    <li>Suryanto-Ekstrand-Whitson-Uleberg-Hoda 2003 BOz split-factor matrix (simulator-output-side counterpart)</li>
    <li>Multistage separator test design (standard PVT laboratory practice)</li>
    <li>PhazeComp (Zick Technologies) - the regression-based reference implementation used for cross-validation</li>
    </ul>
