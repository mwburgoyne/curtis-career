sections:
- heading: Context
  body_html: |-
    <p>The canonical Whitson-group statement on the well-test rate-to-composition conversion problem. While the Kuntadi-Whitson-Hoda 2012 SPE-159400 paper handles the simulator-output side of stream conversion (BOz and z2z delumping), this paper handles the production-measurement side: converting measured well-test separator gas and oil volumetric rates into a molar compositional wellstream rate at each time step, using an EOS flash of a coarse "seed-feed" wellstream composition at the measured separator pressure and temperature. The method has been used at Petrostreamz since 2001 and underpins the Pipe-It / Streamz IAM workflow. Seven worked examples span synthetic and field cases including gas condensate below and above dewpoint, near-critical multi-zone wells, drill-stem tests (DSTs), a synthetic North Sea field where constant-shrinkage-factor reporting introduces up to 50% oil-rate error, 2500-point online-meter automation over a month, and 100-well multi-field asset allocation.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Non-regression rate-to-composition conversion via single EOS flash of seed-feed at measured separator conditions.</strong> The core equation is exact and non-iterative:
        <p style="margin-left:20px;"><code>n<sub>i</sub> = x<sub>i</sub> (q<sub>om</sub>/v<sub>o</sub>) + y<sub>i</sub> (q<sub>gm</sub>/v<sub>g</sub>)</code></p>
        where <code>x<sub>i</sub></code>, <code>y<sub>i</sub></code> are the seed-feed equilibrium oil and gas compositions from an EOS flash at the measured (p, T), and <code>v<sub>o</sub></code>, <code>v<sub>g</sub></code> are the seed-feed EOS-computed separator oil and gas molar volumes. The measured volumetric rates scale the seed-feed separator molar flows; the EOS flash recovers the per-component wellstream molar rates. By construction, the EOS flash of the recovered wellstream at (p, T) reproduces the measured GOR exactly - no iteration required. PhazeComp's regression approach and Pipe-It / Streamz's direct Eq. 1 give visually identical converted compositions across 15 components but Pipe-It / Streamz runs hundreds-of-thousands of conversions per minute, enabling online-meter automation.</li>
    <li><strong>Seed-feed weak-dependency principle and OGR-based lookup tables.</strong> The method is robust to seed-feed choice because equilibrium K-values <code>K<sub>i</sub> = y<sub>i</sub>/x<sub>i</sub></code> are weak functions of overall composition at fixed (p, T). Any reasonable seed-feed estimate - previous-test wellstream, initial reservoir composition, generic field-average composition - gives essentially the same converted wellstream. Where compositional reservoir simulation is available, the Hoda-Whitson workflow builds a per-well lookup table of wellstream composition vs producing OGR (oil-gas ratio). Only ~5 piecewise-linear nodes per component are needed because wellstream composition varies nearly linearly with OGR over a wide range. The paper explicitly recommends OGR over GOR because wellstream composition is non-linear in GOR but nearly linear in OGR (Fig. 20).</li>
    <li><strong>Constant shrinkage factor causes up to 50% oil-rate error; QC against EOS-computed shrinkage.</strong> The reported shrinkage factor SF (ratio of stock-tank oil volume to separator oil volume, typical range 0.99 to less than 0.75) can be compared against EOS-computed shrinkage at the same (p, T). Deviations indicate wrong reported SF (often a constant used when it should vary), wrong separator conditions, or wrong reported composition. Example 5 (synthetic North Sea) shows that using a constant SF when separator temperature varies causes up to 50% oil-rate error - eliminated by converting to molar wellstream and re-processing through the actual facility.</li>
    <li><strong>Drift-correction for separator-temperature-confounded GOR trends.</strong> Example 1 demonstrates a reservoir whose reported GOR <em>increases</em> during a well test simply because test-separator temperature drifts upward (shifting more heavy components from oil into gas). Converting the varying-condition rates to a common reference separator via the Eq. 1 framework reveals that the true wellstream GOR is actually <em>decreasing</em>. Without this correction, a continuously-increasing reported GOR would be misdiagnosed as dewpoint breach or fluid-behaviour change - a costly wrong call.</li>
    <li><strong>Application portfolio: field-wide allocation, multi-field assets, automated online-meter processing.</strong> Example 6: 2500 data points over a month with 15-minute sampling, all converted on the fly to compositional wellstream rates. Example 7: ~100 wells across multiple fields with field-specific EOS models and per-field OGR lookup tables. The framework allocates back to contributing wells by component and by product (sales gas, NGL, stock-tank oil, CO<sub>2</sub>, water). Stream re-processing through a more-efficient reference process can demonstrate &gt;5% oil gain vs the test-separator process - direct economic justification for facility upgrades.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>Don't iterate what you've already measured.</strong> The paper's most pedagogically-important correction is to a widespread practitioner habit: iterating recombination ratios to match measured GOR.</p>
    <blockquote>Eq 1 holds exactly. There is no iteration involved.</blockquote>
    <p>For laboratory-sample recombination, iteration to match physical separator output is correct. For measured-rate recombination, the separator-GOR ratio is already measured and only the wellstream needs to be back-constructed. Iteration is pointless.</p>
    <p><strong>The right knob, the right metrology.</strong> The paper is explicit about which inputs really matter (separator p, T recorded simultaneously with rates) and which do not (exact seed-feed composition). For a practitioner this is operationally important - focus the metrology effort on the sensitive inputs, not the insensitive ones. The OGR-vs-GOR recommendation is similarly load-bearing: choose the right independent variable for interpolation, and a 5-node table replaces a 500-point compositional simulator output with negligible loss of fidelity.</p>
    <p><strong>Generalisation to any surface process.</strong> The same Eq. 1 applies when the gas-product and oil-product compositions <code>y<sub>i</sub></code>, <code>x<sub>i</sub></code> come from any arbitrary surface process - multi-stage separation, CO<sub>2</sub> extraction, NGL plant, Hysys process simulator. The molar fractions are pseudo-K-values (not equilibrium K-values), reflecting that the gas and oil products of a multi-stage process are not in mutual equilibrium.</p>
