- heading: Editorial Context
  body_html: |-
    <p>The full Chapter 17 author list (Batycky, Thiele, Coats, Grindheim, Ponting, Killough, Settari, Thomas, Wallis, Watts, Whitson) is the major-simulator-authors roster of the 2000s. Curtis is the PVT voice in a chapter otherwise written by simulator-engine architects. The structural relationship - PVT specialist providing the fluid-treatment section that the simulator-engine architects then consume - is the same one Curtis maintained with Coats through the 2004 SPE-90390 conformance-as-dispersion paper.</p>
