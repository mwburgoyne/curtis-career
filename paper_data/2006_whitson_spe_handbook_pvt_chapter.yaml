sections:
- heading: Context
  body_html: |-
    <p>A 12-page Whitson-authored section in the SPE flagship reference, sitting inside the Reservoir Simulation chapter that Holstein editorially shepherded for the handbook. The section covers phase-type determination, two-phase flash, density, component partitioning, viscosity, gas-oil interfacial tension, black-oil PVT models, equation-of-state models, three-phase PVT behaviour, surface phase behaviour, thermal-model PVT requirements, and fluid initialisation. Most material reviews the Whitson-Brule 2000 Monograph and the Fevang-Singh-Whitson 2000 SPE-63087 BO-vs-EOS guidelines. Three operational insights are unique to this chapter (not in the Monograph at full weight) and are captured below.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Phase-type determination tradeoff: Michelsen stability test (slow, reliable) vs saturation-pressure calculation (fast, may fail near-critical).</strong> Each grid cell decides at every timestep whether its overall composition is single-phase or two-phase. Two methods are available:
        <ul>
    <li><strong>Michelsen stability test</strong> (Gibbs tangent-plane criterion) - slow because no good K-value initialisation is available (the test is precisely what determines whether to flash), but reliable near-critical.</li>
    <li><strong>Saturation-pressure calculation</strong> - fast because Wilson or previous-timestep K-values provide good initialisation; supplies a single-phase oil-vs-gas tag (which the stability test does not), but may fail to converge or return the trivial solution near-critical.</li>
    </ul>
        Operational guidance: for near-critical compositionally grading reservoirs, the stability test's reliability outweighs its cost. For depletion-dominated oils, the saturation-pressure shortcut with fallback to stability is the common compromise. Either method that detects two phases produces excellent K-value starts for the subsequent Rachford-Rice flash. The diagnostic for a misbehaving compositional simulator: re-run problematic cells with stability-first and check whether timestep oscillations disappear.</li>
    <li><strong>Density errors in reservoir simulation amplify roughly 5x into gravity-segregation potential error.</strong> Gravity segregation is driven by <em>differences</em> of phase densities, not absolute densities. A +5% error in oil density (630 kg/m<sup>3</sup> instead of 600) combined with a -5% error in gas density (380 instead of 400) gives a gravity-segregation potential <code>Δρ<sub>go</sub> = 250</code> kg/m<sup>3</sup> instead of the correct 200 - a 25% error in the segregation driving force from ±5% phase-density errors. Relative-permeability error scales as <code>k<sub>r</sub> ∼ S<sup>n</sup></code> with Corey exponents 2 to 4, so a 5% density error becomes about 15% <code>k<sub>r</sub></code> error for <code>n = 3</code>. Black-oil-specific caveat: black-oil models compute reservoir densities from formation volume factors, solution ratios, and surface densities. Arbitrary or mis-reported surface densities produce subtly wrong reservoir densities that simulators rarely tabulate, so the user may never notice. Recommendation: a well-tuned EOS with Peneloux volume shifts matches reservoir and surface densities to within 1-2%, and black-oil inputs should be generated from that EOS rather than from industry-average surface defaults.</li>
    <li><strong>Three-phase L<sub>1</sub>-L<sub>2</sub>-V flip-flop in two-phase-only EOS simulators causes instability and wasted timesteps.</strong> A second liquid hydrocarbon phase (L<sub>2</sub>) can appear at low temperatures (less than about 140°F) in gas-injection processes using CO<sub>2</sub>- or NGL-enriched gas. When three phases physically exist but the simulator is restricted to two, the two-phase flash may converge to any of L<sub>1</sub>-V, L<sub>2</sub>-V, or L<sub>1</sub>-L<sub>2</sub> depending on K-value start, composition history, and tolerances. The simulator "flips" between solutions across timesteps. Symptoms: repeated timestep cuts, pressure oscillations, failed timesteps, physically implausible saturation paths concentrated near the injector. Remedies in two-phase-only simulators: detect the flip-flop algorithmically and freeze the cell at one solution; re-tune the EOS to discourage L<sub>2</sub> in the operating envelope (incorrect thermodynamics but stable numerics); accept the timestep-cut performance cost. Full remedy: use a three-phase-capable EOS compositional simulator. Curtis cautions against using low-temperature CO<sub>2</sub>-EOR projects as training examples for compositional-modelling novices.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The SPE-canonical PVT-in-simulation reference.</strong> The 2006 SPE Petroleum Engineering Handbook is the profession's standard library reference for petroleum-engineering practice. Curtis's section is the canonical statement on how PVT meets reservoir simulation, sitting inside the Holstein-edited simulation chapter co-authored with the field's leading simulator architects. The handbook's reach is much wider than the SPE journal community; the section travels into petroleum-engineering graduate programmes worldwide.</p>
    <p><strong>The density-error-amplifier warning.</strong> Reservoir engineers used to thinking in absolute densities can be surprised that small density errors translate into much larger segregation errors. The 5x amplification rule from this section becomes a standard pedagogical example.</p>
    <p><strong>The three-phase-flip-flop diagnostic.</strong> CO<sub>2</sub>-EOR project teams running compositional models that fail mysteriously on sensitivity cases with slightly different CO<sub>2</sub> composition or injection temperature now have the textbook explanation. The diagnostic chain (check the cell fluid for L<sub>1</sub>-L<sub>2</sub>-V at operating <code>(p, T, z)</code>; if the EOS flashes three phases, switch simulator or re-tune EOS) reduces what was a black-box failure into a checklist.</p>
