- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Johnsen-Whitson 2008 TIPM 77, 399-415 - the streamline model being correlated</li>
    <li>Aronofsky-Heller 1957 - the 1-D convection-dispersion solution</li>
    <li>Muskat 1949 - the permeability-thickness layer weighting</li>
    <li>Pickens-Grisak 1981 - the canonical aquifer push-pull dataset</li>
    <li>Coats-Whitson-Thomas 2004 SPE-90390 - the apparent-vs-physical dispersivity argument extended to single-well geometry</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Routine practitioner-level tracer-test interpretation in stratified aquifers and reservoirs</li>
    <li>Reservoir-engineering simulation-input recommendations: use the physical dispersivity reference (~0.01 ft) rather than apparent fitted values</li>
    <li>Single-well chemical tracer test analysis for residual-oil-saturation determination</li>
    <li>CO<sub>2</sub>-storage tracer-test interpretation in stratified geological storage formations</li>
    </ul>
  box_style: connections
- heading: Key Collaborator
  body_html: |-
    <p><strong>Sverre Gullikstad Johnsen</strong> — NTNU PhD (2007), co-supervised by Curtis. Two TIPM papers on push-pull tracer test analysis (2008, 2010). Subsequent career at SINTEF on computational fluid dynamics and porous-media flow.</p>
