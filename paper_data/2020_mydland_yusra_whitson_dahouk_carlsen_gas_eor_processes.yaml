sections:
- heading: Context
  body_html: |-
    <p>Methodology / mechanisms paper synthesising the two gas-based same-well cyclic EOR approaches relevant to tight unconventionals: the industry-active Huff-n-Puff (HnP) method (EOG Eagle Ford pilots reporting 30-70% EUR uplift) and the less-developed Fracture-to-Fracture (F2F) method (Zhu 2015, Fu 2019 modelling; no published field applications). Companion to Carlsen et al. 2019 URTeC-539 HnP compositional tracking; this paper focuses on the modelling side - how to simulate these processes correctly without being fooled by numerical dispersion.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>HnP vs F2F mechanism / target-volume dichotomy.</strong> HnP is a <em>mixing</em> process targeting the shattered volume (SV) adjacent to each hydraulic fracture; F2F is a <em>displacement</em> process targeting the entire inter-fracture matrix. First-contact miscibility (FCM) governs HnP mixing; multi-contact miscibility (MCM) governs F2F displacement via vaporising-gas drive, condensing drive, or combined condensing/vaporising per Zick 1986. Different target volumes, different recovery mechanisms, different completion strategies: HnP uses a standard MFHW with the same well for injection and production; F2F uses every-other-fracture alternation via downhole check valves.</li>
    <li><strong>MCM is irrelevant for HnP - the zero-net-recovery-of-miscible-displacement rule.</strong> A counter-intuitive consequence of the cyclic same-well architecture: any miscible front that develops during the huff cycle simply retracts like a piston during the puff cycle, yielding zero incremental recovery. HnP recovery comes strictly from physical mixing at the gas-oil interface; only the first-contact MMP matters. The corollary is that lab MMP screening for HnP targets should report MMP<sub>FC</sub>, not the multi-contact MMP that conventional miscible-flood screening uses.</li>
    <li><strong>Shattered volume plus small rubble plus molecular diffusion as the HnP physical premise.</strong> The SV adjacent to each hydraulic fracture, broken into small rubble pieces and acted on by molecular diffusion (the "stirring" mechanism), is what produces incremental HnP oil. Without SV or with coarse rubble and minimal diffusion, HnP yields negligible recovery. Geometry (cube vs matchstick vs slab) is second-order; minimum rubble dimension is first-order. The framing makes the SV / rubble assumption explicit so it can be tested rather than left as implicit modelling magic.</li>
    <li><strong>Pressure-dependent T<sub>ex,MOD</sub> multiplier for DPM-to-SPM tuning.</strong> Both coarse-gridded single-porosity models (SPM) and dual-porosity models (DPM) inflate HnP recovery via numerical-dispersion-driven artificial mixing. The methodological recommendation: tune a DPM against a rock-scale fine-grid SPM by applying a pressure-dependent multiplier <code>T<sub>ex,MOD</sub></code> on the matrix-fracture exchange transmissibility (Table 3 of the paper: 1.0 at 750 psia down to 5.08e-5 at 10000 psia). With the multiplier in place, the DPM reproduces the rock-scale SPM and becomes tractable at well and field scale without inheriting the SPM's numerical-dispersion HnP-recovery inflation.</li>
    <li><strong>F2F as the alternative UEOR with larger target but slower response.</strong> Cartesian gridding gives tighter control over numerical dispersion than HnP's spherical / radial geometry. F2F's miscible displacement recovers ~2/3 of the inter-fracture matrix (vs HnP's bounded-by-SV-fraction recovery). Ultimate recovery is higher than HnP but the response timescale is years rather than weeks-to-months for tight <code>k<sub>m</sub></code> = 0.01 μd matrix. HnP and F2F share surface facilities, so pilots can start with HnP and transition to F2F.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>Two processes, one taxonomy.</strong> The HnP vs F2F dichotomy gives a clean conceptual map for two processes that the industry had been discussing without distinguishing rigorously. The mixing vs displacement contrast, the SV vs inter-fracture target-volume contrast, and the FCM vs MCM miscibility-type contrast together make the two processes comparable on the same footing.</p>
    <p><strong>The "MCM is irrelevant" rule as conceptual relief.</strong> The argument that the cyclic geometry erases any benefit from multi-contact miscibility for HnP is the kind of small theoretical observation with large practical consequence: operators can stop chasing MCM in HnP gas selection and concentrate on first-contact phase behaviour.</p>
    <p><strong>The numerical-dispersion warning with a concrete fix.</strong> Coarse-gridded HnP simulations produce artificially high incremental recovery because of numerical-dispersion-driven artificial mixing. The pressure-dependent <code>T<sub>ex,MOD</sub></code> multiplier is the engineering response: not "use a finer grid" (intractable) but "tune the DPM to the rock-scale SPM via this calibrated multiplier". Same Curtis pattern as the rest of the unconventional cluster: replace ad-hoc tuning with a calibrated workflow.</p>
