- heading: Key Collaborators
  body_html: |-
    <p>Same multi-organisation team as the 2016 and 2017 papers: Mohsen Ghasemi and Wahyu Astutik (Petrostreamz), Seyyed Ali Alavian (PERA), L. Sigalas and D. Olsen (GEUS chalk-core specialists), and V. S. Suicmez (Maersk Oil and Gas). The three-paper sequence (2016, 2017, 2018) covers static-CVD apparatus, composite-core extension, and the fracture/matrix flow cell with density-matched n-C10.</p>
