sections:
- heading: Context
  body_html: |-
    <p>First-authored by Mathias Lia Carlsen, senior engineer at Whitson AS (the post-2017 rebranding of PERA's commercial arm with Curtis as founder and NTNU Professor Emeritus). Eight-author whitson AS / NTNU paper on the tight-unconventional sampling problem. Strong conceptual reframing and two updated Equilibrium Contact Mixing (ECM) procedures. The paper distils Whitson-group experience across hundreds of unconventional samples into a methodology and vocabulary that the rest of the industry can use. Builds directly on Whitson-Sunjerga 2012 SPE-155499 (the LRS PVT framework) and the Fevang-Whitson 1994 ECM procedure from gas-condensate sampling.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>In-situ representative vs reservoir representative sample classification.</strong> The headline conceptual reframing. Two-tier definition that resolves long-standing terminological confusion:
        <ul>
    <li><em>In-situ representative</em>: represents a volume-weighted average of originally-produced hydrocarbons in place (OOIP / OGIP). The stricter criterion. Used for fluid initialisation (determining OOIP, OGIP, in-situ compositional gradients).</li>
    <li><em>Reservoir representative</em>: any non-contaminated sample produced from the reservoir. The weaker criterion - imposes only non-contamination and origination from the reservoir. Used for EOS-model development.</li>
    </ul>
        Hierarchy: in-situ representative implies reservoir representative; the converse is not true.</li>
    <li><strong>EOS-development misconception correction.</strong> Explicit correction of the industry misconception that <em>only</em> in-situ-representative samples can be used for EOS modelling:
        <blockquote>Every year, PVT data and fluid samples worth millions of dollars are discarded for fluid characterisation purposes because of this misconception.</blockquote>
        Any uncontaminated sample - even a late-life sample under severe multiphase near-wellbore conditions - can and should be used for EOS development, because the EOS must describe <em>all</em> produced fluids throughout the production system. Discarding samples that are merely not in-situ-representative is unnecessarily conservative.</li>
    <li><strong>Four-fluid-type MFHW depletion signature with elevated-saturation-pressure phenomenon.</strong> Systematic catalogue of how producing wellstream properties (saturation pressure, saturation-pressure type, GOR, stock-tank API) evolve with time for black oil, volatile oil, near-critical volatile oil, and near-critical gas condensate systems under both initially-undersaturated and initially-saturated conditions. Two signature observations: (a) saturation-pressure <em>type</em> can flip from bubblepoint to dewpoint during depletion (common for volatile and near-critical fluids), and (b) elevated wellstream saturation pressures <em>exceeding</em> initial reservoir pressure appear in both undersaturated and saturated systems - explained as the same physics as swelling-test saturation-pressure trajectories. Both phenomena are counter-intuitive at first encounter but follow from standard EOS behaviour once the wellstream composition is correctly tracked.</li>
    <li><strong>ECM1 updated procedure for initially undersaturated LRS.</strong> Four-step workflow using the known initial solution GOR <code>R<sub>si</sub> = R<sub>p,i</sub></code> as the matching parameter. Updates Fevang-Whitson 1994 ECM for tight-unconventional conditions. Validated across four fluid systems via detailed compositional simulation: ECM1 reconstruction matches the original reservoir fluid within ±0.5% C7+ error vs ~5-15% error for simple separator recombination.</li>
    <li><strong>ECM2 updated procedure for initially saturated LRS (two variants).</strong> Uses initial reservoir pressure as the matching parameter. Extends Reffstrup-Olsen 1994 and Fevang-Whitson 1994 ECM to cover both cases where wellstream saturation pressure is higher or lower than initial reservoir pressure - the elevated-saturation-pressure case the four-fluid-type signature flagged. Same validation strategy as ECM1.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>Vocabulary correction with direct economic impact.</strong> Curtis's teaching pattern in this paper: when industry practice is conservative for the wrong reason, the right response is to publish the distinction that explains why the conservatism is misplaced. The in-situ vs reservoir-representative split makes the rule operational - reservoir-representative samples for EOS work, in-situ-representative samples for initialisation - and unlocks millions of dollars of previously-discarded data for routine reuse.</p>
    <p><strong>The elevated-saturation-pressure phenomenon explained as standard swelling-test physics.</strong> Wellstream saturation pressures exceeding initial reservoir pressure look anomalous on first encounter and have been mis-flagged as sampling errors. The Carlsen et al. explanation - same physics as a swelling test - is the right kind of demystification: not a new mechanism, just careful application of standard EOS behaviour to a setting where wellstream composition shifts as depletion progresses.</p>
    <p><strong>ECM1 / ECM2 as drop-in replacements for separator recombination in LRS.</strong> The ±0.5% C7+ accuracy vs 5-15% for naive recombination is operationally large enough that operators using the updated procedures get materially better EOS models. The two-variant ECM2 design specifically handles the elevated-saturation-pressure cases that the four-fluid-type signature flagged, closing the loop between the diagnostic observation and the operational procedure.</p>
