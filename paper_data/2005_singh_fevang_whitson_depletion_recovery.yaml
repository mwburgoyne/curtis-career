sections:
- heading: Context
  body_html: |-
    <p>A systematic depletion-recovery study across a continuous GOR sweep from 35 to 25,000 standard m<sup>3</sup>/standard m<sup>3</sup> (Sm<sup>3</sup>/Sm<sup>3</sup>), generated by recombining separator samples of a critical reservoir mixture to different gas-oil ratios. The fluid spectrum covers low-GOR black oil through volatile oil and the critical point at about 700 Sm<sup>3</sup>/Sm<sup>3</sup> to lean gas condensate. A single black-oil PVT table (Peng-Robinson EOS with five C<sub>7+</sub> fractions, critical point 510 bar / 130°C) anchors all fluids. Reservoir conditions: porosity 0.30, permeability 5 millidarcy, layer thickness 30 m, initial reservoir pressure 517 bar. The paper maps recovery across the full fluid taxonomy and identifies four sensitivities to relative permeability, critical gas saturation, plateau-rate constraints, and grid resolution. The companion paper to Fevang-Singh-Whitson 2000 SPE-63087: that paper addressed the BO-vs-compositional model choice for a given fluid; this paper maps recovery vs initial composition across the full fluid taxonomy.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Non-monotonic depletion recovery across the fluid spectrum with a ~16% minimum at the critical point.</strong> Ultimate stock-tank-oil (STO) recovery vs initial solution GOR <code>R<sub>si</sub></code> traces a U-shape with four regimes: rising from low-GOR oils to a maximum of ~30-40% at <code>R<sub>si</sub> ≈ 100</code> Sm<sup>3</sup>/Sm<sup>3</sup>; falling through volatile oil and near-critical to a minimum of about 16% STO recovery at the critical mixture (<code>R<sub>si</sub> ≈ 700</code> Sm<sup>3</sup>/Sm<sup>3</sup>); the same 16% floor on the gas-condensate side; then rising monotonically as condensate becomes lean toward 92% surface-gas recovery at <code>R<sub>si</sub> = 25,695</code> Sm<sup>3</sup>/Sm<sup>3</sup>. The mechanism: at the critical mixture, the fluid is saturated at initial reservoir pressure (no undersaturation expansion), has near-neutral compressibility, and exhibits the highest retrograde liquid saturation with immobile condensate. The number to remember: 16% STO recovery at the critical mixture, versus 30-40% best-case oil and over 90% lean gas condensate.</li>
    <li><strong>Gas-oil relative permeability sensitivity is sharply localised.</strong> Relative-permeability uncertainty affects ultimate recovery 30-40% on the moderate-GOR oil side (at <code>R<sub>si</sub> ≈ 100</code> Sm<sup>3</sup>/Sm<sup>3</sup>) but has essentially zero effect on gas-condensate recovery. The physical reason: condensate recovery is governed by phase behaviour and CVD-style depletion, not by retrograde liquid mobility, because the condensate stays immobile over practically the entire depletion history. Operational consequence: SCAL programmes that measure gas-oil relative permeability for reserves purposes are first-order on oil assets, but essentially pointless for condensate recovery quantification.</li>
    <li><strong>Plateau-rate-constrained optimum GOR shifts upward from the ultimate-recovery optimum.</strong> When a producer is subject to a constant-rate plateau for a fixed period (5 years used as reference), the GOR maximising plateau oil rate is <code>R<sub>si</sub> ≈ 200-250</code> Sm<sup>3</sup>/Sm<sup>3</sup> - higher than the ultimate-recovery optimum at 100 Sm<sup>3</sup>/Sm<sup>3</sup>. Plateau oil rate halves as GOR rises from 250 to 700 Sm<sup>3</sup>/Sm<sup>3</sup>. Plateau gas rate increases monotonically with GOR across the 700-25,000 condensate range. The two optima differ because reserves and rate are not the same thing: the rate-optimal fluid is richer than the recovery-optimal oil, because solution-gas expansion above the bubblepoint supports high early rates.</li>
    <li><strong>Coarse-grid plateau-period overprediction: about 40% for gas condensates, about 20% for moderate-GOR oils, negligible for near-critical.</strong> A typical full-field coarse-grid Cartesian model (30-90 m areal grids, 30 m thick) with standard well-productivity treatment (no pseudopressure, no blockage skin) overpredicts plateau duration by 40% for gas condensates with <code>R<sub>si</sub> = 1,000-10,000</code> Sm<sup>3</sup>/Sm<sup>3</sup>, by about 20% for moderate-GOR oils at 100-200 Sm<sup>3</sup>/Sm<sup>3</sup>, and not at all for near-critical or volatile oils. The error arises from numerical dispersion and smeared near-wellbore pressure gradients that under-estimate the intensity of condensate blockage in the gas-condensate region. Remedies: pseudopressure well treatment, constant blockage-skin surrogate, or local grid refinement around each well.</li>
    <li><strong>Critical gas saturation controls oil depletion recovery but has no effect on gas-reservoir recovery.</strong> Varying critical gas saturation <code>S<sub>gc</sub></code> across 0.0-0.20 shifts oil STO recovery from about 33% to 38% near the optimum (<code>R<sub>si</sub> ≈ 100</code> Sm<sup>3</sup>/Sm<sup>3</sup>) but has no detectable effect on condensate recovery for <code>R<sub>si</sub> &gt; 700</code> Sm<sup>3</sup>/Sm<sup>3</sup>. SCAL programmes measuring <code>S<sub>gc</sub></code> for reserves quantification are valuable on oil assets and essentially pointless on gas-condensate assets. (For deliverability, <code>S<sub>gc</sub></code> still matters via its effect on <code>k<sub>rg</sub>/k<sub>ro</sub></code> - a separate concern from recovery.)</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The universal recovery map.</strong> The U-shaped curve becomes the canonical depletion-screening tool across the reservoir-fluid classification. The practical question that follows is always "on which side of the minimum does my reservoir sit?", which makes the saturation-pressure-vs-GOR diagnostic the entry point for any depletion-vs-IOR decision. Reservoirs with <code>p<sub>sat</sub></code> close to initial reservoir pressure are at or near the 16% minimum and need careful recovery-mechanism assessment.</p>
    <p><strong>Where SCAL pays.</strong> The relative-permeability and critical-gas-saturation sensitivity maps reframe SCAL priorities. For oil assets at moderate GOR (50-250 Sm<sup>3</sup>/Sm<sup>3</sup>), gas-oil <code>k<sub>r</sub></code> is exactly where the reserves-uncertainty money should go. For gas condensates, <code>k<sub>r</sub></code> measurements are deliverability-relevant (blockage) but not recovery-relevant. For oils far from the GOR peak, other uncertainties pay more than relative permeability.</p>
    <p><strong>The 40% rule for gas-condensate coarse-grid screening.</strong> Whitson's teaching shorthand: if you look at a coarse-grid full-field plateau-length prediction for a gas condensate without pseudopressure or blockage-skin treatment, mentally discount the number by 40% before using it for contract-quota design.</p>
