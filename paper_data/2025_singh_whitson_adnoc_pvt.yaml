- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Whitson &amp; Brule (2000) SPE Monograph Chapter 7-8 — compositional simulation preferred over pseudo-PVT for gas injection (the recommendation that justifies the methodology)</li>
    <li>Wang et al. (2020) SPE-202747 — Full-Component Fluid Tracking (FCFT) framework for tracer-based compositional allocation in Abu Dhabi onshore</li>
    <li>Hamoodi et al. (2002) SPE-78363 — hydrocarbon liquid-phase definition with EOS components as tracers (prior work)</li>
    <li>McGuire &amp; Moritz (1992) SPE-20759 — Prudhoe Bay miscible-injectant tracking (foundational miscible-gas EOR tracer work)</li>
    <li>Alklih et al. (2021) SPE-208044 — the field-specific integrated subsurface study for these communicating reservoirs (prior context paper for this field)</li>
    <li>Salahuddin et al. (2017) SPE-186078 — the strike-slip fault-system characterisation for the same field</li>
    <li>Singh, Whitson &amp; Nielsen (2025) SPE-225382 — the PVT-groups BOPVT-consistency framework used for fluid-model validation in this field</li>
    <li>Nielsen &amp; Younus (2025) SPE-225470 — the E2E fluid-model-development workflow used to build the 8-component EOS</li>
    <li>Younus, Whitson &amp; Martinsen (2019) URTeC-551 — field-wide EOS architecture</li>
    </ul>
