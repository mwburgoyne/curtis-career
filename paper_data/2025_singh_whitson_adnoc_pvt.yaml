- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Operational reserves-allocation methodology for communicating-reservoir systems in carbonate plays</li>
    <li>The doubled-EOS validation technique as a general consistency check for tracer-based compositional simulation</li>
    <li>Co-development scheduling tools for the specific Abu Dhabi field and analogous faulted/stratified systems (Ekofisk complex, Alaska North Slope, North Sea satellites)</li>
