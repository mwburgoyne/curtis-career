sections:
- heading: Context
  body_html: |-
    <p>A 28-page invited tutorial at the IBC gas-condensate conference in London, written from the perspective of an active practitioner. The Whitson-Brule SPE Monograph would land the following year. This paper is the tightest single statement of Curtis's gas-condensate PVT philosophy at the moment when the framework was crystallising into book form. Yang was a NTH research collaborator. The paper is operationally provocative: it inverts industry reflex on what PVT inputs actually matter for engineering decisions.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Dewpoint pressure accuracy is usually unimportant.</strong> Curtis's most-quoted provocation:</li>
    </ul><blockquote>"The importance of the <em>actual dewpoint pressure</em> will vary from reservoir to reservoir, but in most situations accurate dewpoint determination is <em>not</em> important."</blockquote><p>Two arguments: (a) condensate yield variation with pressure is dictated by C<sub>7+</sub>-vs-pressure behaviour <em>near</em> the dewpoint, not by the dewpoint value itself; (b) once a well drops below dewpoint into condensate-blockage mode, the BHFP setpoint is dictated by delivery-pressure constraints (typically 50-150 bara), so whether two-phase flow began at 400 or 350 bara is irrelevant. The single exception is GOC prediction via gradient extrapolation, where dewpoint accuracy does matter.</p><ul>
    <li><strong>Recoverable condensate by depletion is insensitive to initial compositional gradient.</strong> For near-saturated reservoirs, absolute recoverable volumes are practically identical with-vs-without compositional grading. The trick is that, below the dewpoint, the reservoir-gas <code>r<sub>s</sub></code> becomes pressure-equilibrated and depth-independent. The compositional gradient affects in-place volumes; it does not affect recovery trajectory. Comparisons should be made on absolute recoverable volumes, not on recovery factors, to see this.</li>
    <li><strong>Oil viscosity is the highest-priority PVT uncertainty for condensate blockage.</strong> <code>μ<sub>o</sub></code> is rarely measured (cell volume limits), correlations are weakest at 0.1-1 cp typical of condensates, and a 2x error in <code>μ<sub>o</sub></code> shifts <code>k<sub>rg</sub>/k<sub>ro</sub></code> by 2x throughout Region 1. By contrast, ±20% errors in <code>V<sub>ro</sub></code> shift <code>k<sub>rg</sub></code> by only a few percent. Recommendation (credited by Curtis to Dr. Jeff Creek of Chevron, ca. 1997): measure separator-condensate viscosity at reservoir temperature across 100-400 bara and tune the LBC or Pedersen model to that dataset.</li>
    <li><strong>Maximum liquid dropout does not determine blockage severity.</strong> What matters is the ratio of reservoir pressure loss to pipe pressure loss. A rich (35% maximum dropout) high-<code>kh</code> well may have negligible blockage. A lean (2% maximum dropout) low-<code>kh</code> well may suffer dramatic blockage. The blockage skin must be evaluated against total system pressure drop, not against fluid richness alone.</li>
    <li><strong>Ultimate condensate recovery decomposition for gas-cycling project evaluation.</strong> A four-term identity:
        <p><code>RF<sub>oult</sub> = RF<sub>oD</sub> + E<sub>S</sub> · RF<sub>oM</sub> + (1 - E<sub>S</sub>) · RF<sub>oDx</sub></code></p>
        for above-dewpoint cycling, with an additional <code>E<sub>S</sub> · E<sub>V</sub> · RF<sub>oV</sub></code> retrograde-vaporisation bonus for below-dewpoint cycling. <code>RF<sub>oD</sub></code> is depletion to the cycling pressure, <code>RF<sub>oM</sub></code> is miscible displacement of condensate in solution, <code>RF<sub>oV</sub></code> is retrograde vaporisation, <code>RF<sub>oDx</sub></code> is post-cycling depletion of the unswept volume. <code>E<sub>S</sub></code> is final sweep efficiency. The decomposition separates PVT-driven contributions from sweep-driven ones and gives a transparent NPV calculation framework.</li>
    <li><strong>Near-wellbore flowing condensate viscosity equals freshly-condensed liquid viscosity, not cumulative CVD.</strong> Near-wellbore Region 1 sees the flowing-wellstream composition; the liquid that equilibrates from this composition is fresh, not the CVD-cumulative mixture (which is enriched by repeated heavy-end deposition). The two viscosities differ by factor 1.5 to 5, with the flowing-wellstream value always lower. Standard black-oil tables built from CVD over-predict <code>μ<sub>o</sub></code> and therefore under-predict <code>k<sub>rg</sub>/k<sub>ro</sub></code> in the near-well. Correction: build <code>μ<sub>o</sub>(p)</code> from CCE on the producing wellstream, not CVD on the original fluid.</li>
    <li><strong>Initialise black-oil gas-condensate reservoirs with <code>R<sub>s</sub></code> and <code>r<sub>s</sub></code> versus depth, not <code>p<sub>s</sub></code> versus depth.</strong> A single BO table calibrated to one fluid plus <code>p<sub>s</sub>(z)</code> initialisation yields initial <code>R<sub>s</sub></code> and <code>r<sub>s</sub></code> values that do not match the local fluids. Initialising <code>R<sub>s</sub>(z)</code> and <code>r<sub>s</sub>(z)</code> directly forces surface-volume initialisation to match the EOS truth at small cost (a tiny error in recoveries near the initial saturation pressures).</li>
    <li><strong>Non-monotonic saturated <code>B<sub>o</sub></code> and <code>R<sub>s</sub></code> for medium-lean condensates.</strong> The first condensate is heavy (low API); cumulative condensate becomes lighter; the API-gravity change has a stronger effect than the pressure decrease, so <code>B<sub>o</sub></code> and <code>R<sub>s</sub></code> both <em>increase</em> with decreasing pressure just below the dewpoint, then resume conventional behaviour at lower pressures. Standing-type correlations miss this. Two-table BO (gas-phase properties from CVD of reservoir gas, oil-phase properties from depletion of incipient oil) is the recommended workaround.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The Whitson disposition concentrated.</strong> If the Monograph is the textbook, this 28-page IBC tutorial is the manifesto. Curtis is willing to say openly that what most PVT reports emphasise (dewpoint accuracy, maximum liquid dropout) matters less than what they barely measure (oil viscosity, near-wellbore flowing-composition behaviour). The 1996 Fevang-Whitson SPE-30714 three-region model is the technical underlay; this 1999 tutorial reframes it into a set of practitioner provocations.</p>
    <p><strong>Recovery decomposition as the cycling-economics tool.</strong> The four-term identity is Curtis's preferred way to triage a gas-cycling proposal: which contribution is large, which is uncertain, which is sweep-driven, which is PVT-driven. The decomposition reappears in the 2000 Monograph and in Whitson Academy course content on gas-cycling economics.</p>
