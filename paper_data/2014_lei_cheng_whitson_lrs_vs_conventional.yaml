sections:
- heading: Context
  body_html: |-
    <p>Lei is first author (FMC Technologies), Cheng is second (Statoil), Curtis is third in supervisory role. The paper is a systematic permeability-space map that locates the boundaries between ultra-tight ("shale") and conventional depletion behaviour for liquid-rich reservoirs. Where Whitson-Sunjerga 2012 SPE-155499 established the PVT behaviour of liquid-rich shale (LRS) wells (producing oil-gas ratio (OGR) much lower than in-situ OGR, gas condensate produces only solution condensate at flowing bottomhole pressure, constant producing OGR as the infinite-acting characteristic) and Juell-Whitson 2013 SPE-166380 established the single-well finite-difference model plus net-present-value optimisation framework, this paper provides the transition-boundary quantification that tells practitioners <em>where</em> each methodology applies. Four reservoir fluid systems studied over permeability range 10 nd to 100 md (seven orders of magnitude): rich gas condensate, near-critical oil, highly-undersaturated gas condensate, and moderate-GOR oil.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Revenue ratio R(365 d) / R(10 d) as universal permeability classifier.</strong> The dimensionless ratio of cumulative project revenue at 1 year vs 10 days, geometry-normalised by adjusting well completion to deliver a common 10-day revenue target (0.5 MUSD for higher-GOR fluids, 1.0 MUSD for moderate-GOR oil). Asymptotic behaviour:
        <ul>
    <li>Ultra-tight: ratio ≈ 7. Pressure transient has not yet touched the inter-fracture volume boundary; flow is linear into individual fractures; cumulative grows much more slowly than time.</li>
    <li>Conventional: ratio ≈ 36.5 (= 365/10). Rate is quasi-steady-state proportional to drawdown, so cumulative scales linearly with time.</li>
    <li>Transition: gradual, ~1.5-2 log cycles wide between asymptotes.</li>
    </ul>
        Operational use: compute the revenue ratio at 1 year to classify whether the well is conventional, transitional, or ultra-tight, then pick the right forecasting methodology - decline-curve analysis for conventional, history-matched numerical model for ultra-tight.</li>
    <li><strong>Quantitative permeability-classification cutoffs.</strong> Conventional behaviour: matrix permeability k &gt; ~0.5 md. Ultra-tight behaviour: k &lt; 1-5 × 10<sup>-3</sup> md. Transition band: ~1.5-2 log cycles between these limits. Specific cutoffs vary slightly by fluid system, with the rich gas-condensate and near-critical oil cases most stringent.</li>
    <li><strong>Highly-undersaturated systems preserve conventional behaviour deeper into tight rock.</strong> Highly-undersaturated gas condensate (<code>p<sub>Ri</sub></code> = 10,000 psia, <code>p<sub>d</sub></code> = 4,400 psia) behaves conventionally down to k = 0.05 md - one log cycle deeper than its saturated counterpart - because single-phase flow dominates everywhere except locally near fractures. Highly-undersaturated moderate-GOR oil (<code>p<sub>Ri</sub></code> = 6,500 psia, <code>p<sub>b</sub></code> = 3,150 psia, initial GOR 1,000 scf/STB) shows constant producing GOR equal to initial solution GOR over 10 years at k = 0.2-1.0 md, demonstrating that the conventional-fluid-character zone extends much further into tight rock when the reservoir starts well above its saturation pressure.</li>
    <li><strong>Explicit recommendation against average pressure and recovery factor as LRS performance metrics.</strong> The paper is unusually direct in calling out commonly-used metrics that do not work for ultra-tight LRS. Depletion is localised to inter-fracture volumes with arbitrary drainage-area assignment, so volumetric-average reservoir pressure is not meaningfully defined. Recovery factor depends on assumed drainage area, which is also arbitrary. The revenue ratio sidesteps both problems because it depends only on observable production rates and prices.</li>
    <li><strong>Analytical asymptotes for single-phase flow.</strong> For single-phase dimensionless-rate solutions (linear flow into infinite-acting plus pseudo-steady-state boundary), the revenue ratio can be computed in closed form as the ratio of cumulative production at 365 vs 10 days. The asymptotes ~7 and ~36.5 fall out analytically without simulation, anchoring the empirical findings against single-phase theory.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The classification-tool teaching pattern.</strong> Curtis's preference for diagnostics that work across the full parameter space: rather than building separate models for ultra-tight and conventional wells, build one map that locates which regime a given well sits in. Then the practitioner knows which forecasting tool to reach for. The revenue ratio is the right diagnostic because it is dimensionless, geometry-normalised, and economically grounded - it tells the operator something operationally meaningful at the same time as it classifies the well.</p>
    <p><strong>Why undersaturation extends the conventional zone.</strong> The undersaturation result is non-obvious. Standard intuition: tighter rock means LRS behaviour. The finding: tighter rock plus high undersaturation still gives conventional behaviour because the single-phase flow regime persists. This widens the operating envelope where conventional decline-curve analysis remains defensible - useful for tight-oil reservoirs that were initially over-pressured.</p>
    <p><strong>Honest about its own assumptions.</strong> The paper explicitly notes that the 640-acre drainage area and the specific revenue targets are chosen for methodology uniformity, not field realism. Different choices would shift absolute revenue but not the qualitative classification. Calling out which inputs matter for which conclusions is the same discipline that runs through Juell-Whitson 2011 SPE-146066 layered backpressure and Bøe-Skjæveland-Whitson 1989 two-phase pressure-test analysis.</p>
