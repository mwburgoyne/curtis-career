- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Whitson-Sunjerga 2012 SPE-155499 - the LRS PVT framework and reference EOS for the higher-GOR fluids</li>
    <li>Juell-Whitson 2013 SPE-166380 - the half-fracture symmetry-element FD modelling framework</li>
    <li>SENSOR (Coats Engineering) finite-difference simulator</li>
    <li>Linear-flow and pseudo-steady-state dimensionless-rate solutions (the analytical anchor)</li>
    <li>Arps decline-curve analysis (the conventional-regime forecasting tool)</li>
    </ul>
