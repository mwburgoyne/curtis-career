    <li>Whitson-Brule 2000 SPE Monograph - the ECM framework appears in the sampling chapter as canonical practice</li>
    <li>Høier-Cheng-Whitson 2004 SPE-90379 undersaturated gas-oil miscibility framework - the multi-sample EOS is the prerequisite</li>
    <li>Younus 2019 URTeC-551 field-wide EOS workflow</li>
    <li>Operator gas-injection PVT programmes - MCV is now standard for near-critical fluids</li>
