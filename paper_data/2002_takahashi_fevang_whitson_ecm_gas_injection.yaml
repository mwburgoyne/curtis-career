- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Fevang-Whitson 1994 SPE-28829 - the ECM framework</li>
    <li>Whitson-Anderson-Søreide 1989/1990 - multi-sample shared-pseudocomponent C<sub>7+</sub> Gaussian quadrature</li>
    <li>Smith et al. 2000 SPE-63088 - triple-plot QC and single-EOS-across-compartments</li>
    <li>Zick 1986 condensing/vaporising miscibility mechanism (the near-critical transition this paper tunes against)</li>
    <li>Hearn-Whitson 1995 SPE-29115 - density-distance diagnostic and CV-mechanism EOS tuning</li>
    </ul>
