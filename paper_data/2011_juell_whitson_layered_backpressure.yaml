- heading: Key Collaborator
  body_html: |-
    <p><strong>Aleksander Oma Juell</strong> — NTNU M.Sc. then PhD under Curtis. Co-author with Whitson on Juell-Whitson-Hoda 2009 SPE-121252 IAM benchmark, this paper, and Whitson-Rahmawati-Juell 2012 SPE-153073 cyclic-shut-in control. Three-paper sequence on layered-gas-well monitoring and optimisation.</p>
