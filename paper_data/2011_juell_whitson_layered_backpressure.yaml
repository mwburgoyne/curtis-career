sections:
- heading: Context
  body_html: |-
    <p>Aleksander Juell's NTNU M.Sc. thesis work with Curtis supervision. The paper derives a multi-layer backpressure equation (BPE) for wells producing from layered gas reservoirs with or without inter-layer communication. The deliverability problem in layered systems had typically been treated as requiring transient-superposition or convolution-integral machinery. Juell and Whitson show that the steady-state deliverability problem reduces exactly to the single-layer Fetkovich (1975) form, provided the layer constants and shut-in pressures are averaged correctly. Validated against numerical simulation and against 1967-2009 annual shut-in pressure and production data from the publicly-available Buf #3 well (API #3513900778) in the Oklahoma Guymon-Hugoton field - a three-layer no-crossflow system (Herrington, Krider, Winfield reservoirs from Fetkovich-Ebbs-Voelker 1994).</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Layered gas-reservoir BPE preserves the single-layer Fetkovich form with productivity-index-weighted pressure average.</strong> For <em>N</em> no-crossflow layers each obeying the Fetkovich single-layer BPE <code>q<sub>gl</sub> = C<sub>Rl</sub>(p<sub>cl</sub><sup>2</sup> - p<sub>w</sub><sup>2</sup>)</code>:
        <p>Total productivity index: <code>C<sub>R</sub> = ∑<sub>l</sub> C<sub>Rl</sub></code></p>
    <p>PI-weighted average shut-in pressure squared: <code>p̅<sub>c</sub><sup>2</sup> = ∑<sub>l</sub> (C<sub>Rl</sub> p<sub>cl</sub><sup>2</sup>) / C<sub>R</sub></code></p>
    <p>Total rate: <code>q<sub>g</sub> = C<sub>R</sub> (p̅<sub>c</sub><sup>2</sup> - p<sub>w</sub><sup>2</sup>)</code></p>
        The same form as the single-layer BPE. The PI-weighted average is the pressure recorded at the wellhead during shut-in because the layered total is zero at <code>p<sub>w</sub> = p̅<sub>c</sub></code>. Backflow through the wellbore during shut-in between layers at different pressures is embedded in the derivation. Coupled with per-layer material balance, the framework also forecasts depletion. Validated against numerical simulation (matches within plotting symbol thickness across 20 years with multiple shut-in cycles) and against the Buf #3 field case (reproduces 1967-2009 annual tubinghead shut-in pressures; reproduces an independent 1989 layer-pressure test without refitting; fitted drainage radii 832/1119/1041 m for the three Hugoton layers).</li>
    <li><strong>Long-term BPE monitoring with consistent shut-in durations detects tubing and reservoir performance deterioration.</strong> A log-log plot of <code>(p̅<sub>c</sub><sup>2</sup> - p<sub>t</sub><sup>2</sup>)</code> vs <code>q<sub>g</sub></code> at the wellhead establishes a well-specific deliverability curve. Each annual test that falls below the line indicates performance deterioration (tubing plugging, near-well skin increase, water coning); points above the line indicate improvement. A +20 skin insult introduced in a numerical model after 10 years produces a clear shift below the established backpressure line. Operational requirements: consistent shut-in durations across tests (mixing durations creates spurious scatter); post-shut-in flow period of equal duration as the shut-in; record <code>p̅<sub>c</sub></code> at the end of the shut-in; record <code>q<sub>g</sub></code> and <code>p<sub>t</sub></code> after the shut-in. The method is robust to partial or full layer communication (transmissibility 0 to 1 all on the same line) and to test-condition departures from normal operation - features the monitoring relies on because layer communication is rarely known a priori.</li>
    <li><strong>Validity scope: permeability above ~0.01 millidarcy, pressure-squared regime, no significant rate-dependent skin.</strong> Four explicit limits identified by sensitivity studies. Below ~0.01 millidarcy, transient effects dominate the deliverability response on annual-test timescales and the pseudo-steady-state assumption breaks. At high reservoir pressure (above ~300 bara dry gas) the pressure-squared form fails and pseudopressure must replace it. Wells with significant non-Darcy flow need a layered Forchheimer treatment that the authors could not successfully derive (acknowledged as an open problem). The pseudo-steady-state-on-shut-in-timescale assumption typically holds for <code>k &gt; 0.01</code> mD with 640-acre spacing.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The multi-layer problem collapses to the single-layer form.</strong> Curtis's teaching pattern: the layered-well problem is often taught as requiring new machinery (transient superposition, convolution integrals); the Juell-Whitson result is that the steady-state deliverability problem reduces exactly to the single-layer form you already know, provided you compute the PI-weighted pressure as the "well-felt" shut-in pressure (not an arithmetic or pore-volume-weighted average). The familiar Fetkovich log-log plot remains the right tool, nothing lost.</p>
    <p><strong>The honest-limits move.</strong> The paper is unusual in explicitly cataloguing where its machinery fails: permeability floor, pressure-squared breakdown, non-Darcy open problem, pseudo-steady-state assumption. Many deliverability papers cheer-lead their methodology without quantifying failure modes. This pattern of explicit validity-regime cataloguing runs through Curtis's bibliography from Bøe-Skjæveland-Whitson 1989 onwards.</p>
    <p><strong>The Hugoton field validation.</strong> A 63-year (1946-2009) production record reproduced with three layer permeabilities and three drainage radii fitted to annual shut-in pressure history. The 1989 independent layer-pressure test is matched without refitting - the strongest test of the framework's predictive ability.</p>
