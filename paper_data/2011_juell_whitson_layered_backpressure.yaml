- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Fetkovich 1975 - the single-layer backpressure equation</li>
    <li>Fetkovich-Ebbs-Voelker 1994 - the Buf #3 Guymon-Hugoton field dataset</li>
    <li>Muskat 1949 - permeability-thickness layer weighting</li>
    <li>Bøe-Skjæveland-Whitson 1989 SPE-10224 two-phase pressure test analysis (the explicit-validity-regime pattern)</li>
    <li>Singh-Whitson 2008 SPE-117930 - layered pseudopressure for gas condensate (the two-phase counterpart)</li>
    <li>Golan-Whitson 2003 <em>Well Performance</em> textbook (cited as the layered-system reference once the paper appeared)</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Operator routine annual deliverability-test monitoring protocols for layered Hugoton/Permian-type gas wells</li>
    <li>Whitson-Rahmawati-Juell 2012 SPE-153073 cyclic-shut-in control - same layered no-crossflow regime, complementary monitoring</li>
    <li>Knudsen-Foss-Whitson-Conn 2012 ADCHEM12 mixed-integer-linear-program (MILP) scheduled shut-ins - same layered framework with binary-decision optimisation overlay</li>
    <li>Golan-Whitson <em>Well Performance</em> second edition (and later teaching material) - the canonical layered-system backpressure reference</li>
    </ul>
