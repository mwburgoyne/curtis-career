- heading: Note on Authorship
  body_html: |-
    <p>This is one of the few entries on this page where Curtis is one of several co-authors of a collectively-written review. The three contributions above are Whitson-anchored arguments that travel from his SPE corpus into the Schlumberger review; the eight-author byline reflects the consensus framing rather than disputing credit. The remaining sections of the review (sampling protocols, sour-gas considerations, EOR options) draw on the other co-authors' expertise.</p>
