sections:
- heading: Context
  body_html: |-
    <p>Fluid-model-comparison companion to the same-team SPE-200396 mechanism paper. Where SPE-200396 establishes <em>what</em> HnP and F2F are, this paper quantifies <em>whether the standard black-oil PVT (BOPVT) reservoir-simulation fluid model is fit for purpose</em> against the compositional (COMP) reference. All simulations on a planar-fracture symmetry-element model in Sensor (Coats Engineering) using a tuned 11-pseudo-component PR EOS for the field-wide Eagle Ford fluid suite (black oil, volatile oil, near-critical oil, near-critical gas condensate, gas condensate) and four injection gases (C<sub>2</sub>-enriched, lean-processed, separator, IG composition). PhazeComp (Zick) drives all PVT calculations. Five reservoir fluids crossed with multiple injection gases and multiple cases (single-cell DP HnP, well-scale HnP, two-layer HnP, two-phase-saturated HnP, F2F) map where BOPVT works and where it fails.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>BOPVT systematically overpredicts HnP recovery via static <code>r<sub>s</sub>(p)</code>.</strong> The single BOPVT table assumes <code>1/r<sub>s</sub>(p)</code> is invariant throughout the HnP process; the COMP reference shows <code>r<sub>s</sub></code> exhibits severe hysteresis with each injection cycle as the matrix oil becomes heavier and harder to vaporise. Diagnostics: saturation-pressure decoupling (BOPVT <code>p<sub>s</sub></code> collapses to ~1500 psia by cycle 5 while COMP <code>p<sub>s</sub></code> climbs to 9930 psia); and the <code>&eta;(t<sub>ep</sub>)</code> cycle-efficiency table (BOPVT stays at 0.55+ while COMP drops to under 0.01). Overprediction can reach 10-20 percentage points of OOIP after several cycles.</li>
    <li><strong>Two-part BOPVT table generation with incremental-swelling upper extension.</strong> Standard CCE-on-initial-fluid generates the <em>lower</em> BOPVT table for <code>p &le; p<sub>si</sub></code>, leaving a missing GOR range from ~500 scf/STB to ~36,350 scf/STB that gas-injection cells routinely traverse and that triggers simulator instability. The paper closes the gap with an <em>upper</em> table built via incremental swelling of the initial-fluid equilibrium liquid with the injection gas to a critical mixture (<code>K<sub>i</sub> = 1</code>), running a CCE at each swell increment between maximum pressure and the cell's saturation pressure. Of three tested extension methods (single-stage swell, incremental swell, convergence-pressure negative-flash), incremental swell is selected for stability and smooth GOR / R<sub>s</sub> / 1/r<sub>s</sub> transitions.</li>
    <li><strong>F2F operational design rule <code>p<sub>wf</sub> &lt; MMP<sub>MC</sub> &lt; p<sub>fr</sub> &lt; p<sub>twf</sub></code>.</strong> F2F succeeds only if the frontal pressure <code>p<sub>fr</sub></code> stays above <code>MMP<sub>MC</sub></code> for a robust majority of the production period. Recipe: hold injection-fracture BHP at the <code>MMP<sub>MC</sub></code>-derived minimum (4500 psia in the worked example) during production and fix the production-period duration for all subsequent cycles equal to that of the first cycle. Three contributing factors maintain miscibility: (1) the displacement front stays close to the injection fracture so <code>p<sub>fr</sub> &asymp; p<sub>inj-fr</sub></code>; (2) miscibility is a dimmer not a switch (near-miscible <code>p<sub>fr</sub></code> is still highly efficient); (3) constant-duration production schedules cause the minimum injection-fracture pressure to increase with cycle, adding pressure to the front.</li>
    <li><strong>F2F BOPVT validity by fluid type.</strong> For black-oil / volatile-oil / near-critical-oil with <code>R<sub>s</sub> &lt; 2000</code> scf/STB, BOPVT and COMP agree well on F2F oil recovery: most of the pressure drop occurs in the oil phase ahead of the front and the mixing zone stays narrow, so the static <code>1/r<sub>s</sub>(p)</code> approximation is locally valid. For near-critical gas condensate and gas condensate, the cyclic pressure swing causes <code>p<sub>fr</sub></code> to oscillate around <code>MMP<sub>MC</sub></code> and gas can cyclically move ahead of the front and disperse the miscible bank. Recovery degenerates to vaporisation-driven (which BOPVT cannot capture) plus partially-miscible Buckley-Leverett. NCGC breakthrough occurs much later in BOPVT than COMP; GC F2F is essentially vaporisation-only and BOPVT fails entirely.</li>
    <li><strong>Recurrently-changing BOPVT tables via CVI/CVD as 34-36x faster COMP alternative.</strong> The static-<code>r<sub>s</sub>(p)</code> failure can be patched by recurrently changing the BOPVT table - one table per HnP cycle - using Sensor's PVT-region update capability. Cycle-end matrix compositions can be obtained either from a one-off COMP simulation or, more cheaply, from the Carlsen-Whitson-Dahouk 2019 CVI/CVD experiment on a tuned EOS. Runtime on the VO single-layer HnP case: BOPVT single-table 10.6 min, BOPVT CVI/CVD multi-table 10.6 min, BOPVT COMP-z<sub>i</sub> multi-table 11.2 min, COMP 382.1 min - 34-36x speedup with substantially improved accuracy over single-table BOPVT, useful when many runs are needed in a short time (e.g. history matching).</li>
    </ul>
- heading: Significance and Contribution
  box_style: influence
  body_html: |-
    <p><strong>The BOPVT-vs-COMP question, settled by fluid type and process.</strong> The 2020 unconventional-EOR cluster needed an answer to a question every operator runs into: can we keep using black-oil tables for HnP and F2F, or do we have to switch to compositional? This paper says: BOPVT systematically overpredicts HnP across all fluid types (use COMP or the CVI/CVD multi-table patch); BOPVT works for F2F on low-to-medium-GOR oils but fails for gas-condensate systems where miscibility is fragile.</p>
    <p><strong>The upper-extension BOPVT table.</strong> The simulator-instability problem when gas-injection cells traverse the missing GOR range above <code>p<sub>si</sub></code> is a well-known practical headache. The incremental-swelling extension named in this paper is a concrete recipe that avoids the instability and preserves smooth lookups. The choice between three extension methods - and the argument for incremental-swelling - is the kind of engineering judgement that makes the paper operationally usable.</p>
    <p><strong>The 34-36x COMP-speedup patch.</strong> The CVI/CVD-driven recurrently-changing BOPVT tables sit at the right place on the cost / accuracy curve for history-matching workflows where many runs are needed. The matrix-composition source matters less than that <em>some</em> reasonable composition is fed in per cycle. The patch makes HnP simulation tractable for ensemble forecasting.</p>
