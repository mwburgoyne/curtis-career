sections:
- heading: Context
  body_html: |-
    <p>Generalises the Bowie-Ewert 2020 URTeC-2967 numerically-assisted RTA workflow to (a) all fluid systems including gas condensates and two-phase saturated reservoirs, and (b) finite-conductivity fractures. Dedicated to Michael "Mike" Fetkovich, Curtis's long-standing material-balance-and-rate-transient interlocutor. Bowie carries over from the original Bowie-Ewert co-authorship at Apache; the Carlsen-Mydland-Dahouk-Whitson-Yusra core team is the same group that produced the 2020 surface-process triplet (IPTC-19596 / 19775 / SPE-199982), the HnP mechanisms / Second-Take pair (SPE-200396 / URTeC-2869), and the BOPVT-vs-COMP simulation paper (URTeC-2765).</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Modified Linear Flow Parameter <code>LFP'</code> = <code>LFP &times; &radic;&phi;</code> with B<sub>ti</sub> generalisation.</strong> The classic LFP = <code>4 n<sub>f</sub> x<sub>f</sub> h &radic;k</code> (Wattenbarger 1998 for tight gas) is extended in two directions to make it the central parameter for all-fluid-system numerical RTA: (1) include porosity so cross-well <code>&phi;</code> changes are handled consistently; (2) generalise to all fluid systems via a saturation-weighted total formation volume factor <code>B<sub>ti</sub> = (S<sub>oi</sub> + S<sub>gi</sub>) / (S<sub>oi</sub>/B<sub>oi</sub> + S<sub>gi</sub>/(B<sub>gdi</sub>/r<sub>si</sub>))</code>. For dry gas, OGIP replaces OOIP via <code>B<sub>ti</sub> &rarr; &infin;</code>.</li>
    <li><strong>Three fundamental <code>LFP'</code> / OOIP equivalence relationships.</strong> The theoretical backbone of NRTA: (1) same <code>LFP'</code> &rarr; same gas / oil / water surface rates during initial-acceleration linear flow regardless of OOIP; (2) same <code>LFP' / OOIP</code> ratio &rarr; same producing GOR and water cut at all times (IA and boundary-dominated), regardless of absolute LFP and OOIP values - well performance differs only by a constant multiplier; (3) same <code>LFP'</code> AND same OOIP &rarr; identical performance everywhere. Demonstrated with three-case worked examples.</li>
    <li><strong>Eight-step Numerical RTA workflow.</strong> Operational procedure: build a single-fracture symmetry-element "template model" with infinite OOIP; run with the actual well BHP profile <code>p<sub>wf</sub>(t)</code>; compute the daily ratio <code>r = q<sub>o,actual</sub> / q<sub>o,IA</sub></code> (or cumulative-ratio "cumulative <code>LFP'</code>" for noise reduction); multiply <code>r</code> by the template <code>LFP'</code> to get daily <code>LFP'(t)</code>; pick representative <code>LFP'</code> from the early-time flat region; generate type curves at multiple smaller OOIP values; pick the OOIP curve best matching production data; resolve <code>k</code> and <code>x<sub>f</sub></code> once L, n<sub>f</sub>, h, &phi; are assumed.</li>
    <li><strong>Finite-conductivity fracture <code>F<sub>cd</sub></code> consistency-conversion equation.</strong> When transitioning from the NRTA template model (single fracture, large permeability) to the history-matching realisation (multiple fractures, smaller permeability), <code>F<sub>cd</sub></code> must be recomputed via <code>F<sub>cd,2</sub> = F<sub>cd,1</sub> &times; (k<sub>1</sub> h<sub>1</sub> n<sub>f,1</sub>) / (k<sub>2</sub> h<sub>2</sub> n<sub>f,2</sub>) &times; (&beta;<sub>2</sub> / &beta;<sub>1</sub>)</code>. Worked example: <code>F<sub>cd,1</sub> = 8</code> in the template model converts to <code>F<sub>cd,2</sub> = 14</code> in the HM realisation.</li>
    <li><strong>Contacted pore volume <code>V<sub>p</sub></code> and gross rock volume <code>V<sub>R</sub></code> as completion-effectiveness metrics.</strong> OOIP alone is misleading for cross-well completion-effectiveness comparison across very different fluid initialisations (an <code>S<sub>wi</sub> = 100%</code> reservoir has OOIP = 0 regardless of completion quality). <code>V<sub>p</sub> = HCPV / (1 - S<sub>wi</sub>) = OOIP / (1 - S<sub>wi</sub>) &times; B<sub>ti</sub></code> and <code>V<sub>R</sub> = V<sub>p</sub> / &phi;</code> are fluid-independent metrics that can be regressed against completion design (proppant mass, fluid volume, cluster spacing) across a basin.</li>
    </ul>
- heading: Significance and Contribution
  box_style: influence
  body_html: |-
    <p><strong>The NRTA workflow that the unconventional cluster had been building toward.</strong> The 2020 surface-process triplet gave the operator the right rates; the BOPVT-vs-COMP paper made the simulation tractable; the well-box heterogeneity series gave the right reservoir model. This paper assembles the parts into a single rate-transient analysis methodology that handles all fluid systems and finite-conductivity fractures simultaneously - a generalisation that classical RTA, designed for single-phase oil and infinite-conductivity fractures, could not deliver.</p>
    <p><strong>The three equivalence relationships are pedagogical gold.</strong> Same <code>LFP'</code> means same rate during linear flow; same ratio means same GOR/WC trajectories; same both means identical. The hierarchy lets students and engineers reason about RTA outputs without solving the underlying problem each time. The Whitson-Brule SPE Monograph 2000 pattern of "name the principle, give the working tool" recurs here.</p>
    <p><strong>The completion-effectiveness metric correction.</strong> Naming <code>V<sub>p</sub></code> and <code>V<sub>R</sub></code> as the right cross-well comparison axis - not OOIP - addresses a real industry confusion. Wells with high initial water saturation, gas-condensate wells, near-critical fluid wells all get pulled toward fair comparison when completion-team benchmarking uses contacted-pore-volume rather than initial-oil-in-place.</p>
