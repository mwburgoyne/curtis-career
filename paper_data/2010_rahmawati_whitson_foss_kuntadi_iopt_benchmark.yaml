sections:
- heading: Context
  body_html: |-
    <p>Extends the Juell-Whitson-Hoda 2009 SPE-121252 integrated asset management (IAM) benchmark from a two-gas-condensate-reservoir + simple-process + minimal-NPV stack to a three-reservoir full-field system: two gas-condensate reservoirs + one oil reservoir under miscible water-alternating-gas (WAG) injection, with a complete field-wide surface facility (HYSYS process model including CO<sub>2</sub> removal, NGL plant with dew-point controller, three-stage liquid separation, two-stage gas separation, gas reinjection network) and full NPV with operating expense, CO<sub>2</sub> removal cost, water handling, and NGL revenue. The oil reservoir is the SPE-5 Comparative Solution Project (Killough-Kossack 1987). Integration via Pipe-It (Petrostreamz) with Nelder-Mead simplex optimisation; reservoir simulation by SENSOR (Coats Engineering); surface process by HYSYS via OLE and Ruby scripting; tubing-head-pressure tables generated by PROSPER.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Multi-field IAM benchmark with three reservoirs and full surface facility.</strong> The first open-benchmark IAM problem that includes a WAG-injected oil reservoir alongside gas-condensate cycling and a richer surface stack. NPV components include sales gas, NGL, condensate, water-handling, CO<sub>2</sub> removal, power, and operating expense (1 million USD/day base case). Six final products: sales gas, fuel gas, reinjected-lean-GC, reinjected-rich-GC, reinjected-oil, NGL. Two optimisation scenarios: surface-only (4 decision variables) and combined surface + oil-reservoir WAG (5 decision variables). Base-case run time ~6 minutes; scenario-1 optimisation 28 CPU hours / 267 iterations / 9% NPV uplift; scenario-2 34 CPU hours / 334 iterations / 15% NPV uplift.</li>
    <li><strong>Simultaneous WAG (shortest cycle) gives highest NPV for miscible WAG oil reservoirs.</strong> NPV is monotonically decreasing with WAG cycle length over the tested range (30 to 365 days), with the shortest cycle approximating simultaneous WAG (SWAG). The optimised cycle length converges to 42.5 days. Mechanism: miscible WAG efficiency requires water and miscible gas to be co-present at the displacement front; long cycles allow the front to travel as either a gas-only or water-only slug, losing the miscible-displacement plus water-mobility-control combination. For miscible-WAG oil reservoirs integrated with a field-wide asset, the natural tendency is the shortest cycle - limited by surface-facility switching practicality, not reservoir physics.</li>
    <li><strong>HYSYS expects the negative of the volume-shift factor.</strong> When coupling HYSYS with a compositional reservoir simulator (SENSOR, ECLIPSE, PVTi, PhazeComp), the user must negate the Peneloux volume-shift factor <code>s</code> when transferring EOS input. HYSYS internally computes <code>V<sub>L</sub><sup>corr,HYSYS</sup> = V<sub>L</sub><sup>EOS</sup> + s<sub>HYSYS</sub>·b</code>, opposite sign to the standard reservoir-simulator convention. If the sign flip is missed, liquid densities at surface-process conditions are wrong by typically 5-10%, with NGL yields, condensate volumes, and separator phase splits then carrying material errors that compound into NPV errors. A specific instance of the general principle: when integrating multi-vendor tools, never trust that the same EOS parameter name means the same thing; cross-validate at a reference pressure-temperature-composition point.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>The benchmark extension argument.</strong> Open-benchmark engineering: build a reproducible, documented test case that academia and industry can both implement on alternative platforms (SENSOR vs Eclipse, HYSYS vs UniSim), so that integrated-optimisation algorithm comparisons are not contaminated by proprietary model differences. The step from 2-reservoir to 3-reservoir-including-WAG and from minimal-NPV to full-cost-NPV adds realistic operational complexity (water handling, CO<sub>2</sub> removal, NGL plant) without sacrificing reproducibility.</p>
    <p><strong>The HYSYS sign-flip diagnostic.</strong> In practice many workflows carry this error silently for years because liquid-density errors don't obviously cascade into production-rate errors until NGL or condensate volumes are tracked. The teaching point: software-quirk debugging is a first-class skill in multi-vendor IAM.</p>
