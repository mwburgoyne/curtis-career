- heading: Key Collaborator
  body_html: |-
    <p><strong>Kjell R. Christoffersen</strong> — NTH PhD student under Curtis, then Statoil Research Centre. Built the thin-membrane apparatus described here. Christoffersen ran the 1989-1991 constant-volume-diffusion experiments that motivated Curtis's 1992 collaboration with Michelsen on the CVD interpretation code.</p>
