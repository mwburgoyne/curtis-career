sections:
- heading: Context
  body_html: |-
    <p>Kjell Christoffersen's NTH PhD work. The 1992 constant-volume-diffusion experiments that prompted the Whitson-Michelsen collaboration on the diffusion code were Christoffersen's; this 1994 paper is the capillary-pressure complement of the Ekofisk PVT programme. Five md Stevns outcrop chalk is the experimental analogue for Ekofisk reservoir chalk. The fluid system is the C<sub>1</sub>-nC<sub>5</sub> binary at 70, 105, and 130 bar (IFT 6.3, 3.2, 1.5 mN/m respectively). The headline finding overturns a piece of laboratory practice that the industry had been relying on for decades.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Thin-membrane apparatus for fast high-pressure chalk <code>p<sub>c</sub></code>.</strong> A desaturation cell using thin polymer membranes replaces the traditional 6 mm porous ceramic plate, cutting <code>p<sub>c</sub></code> measurement time on 5 md chalk from months to about 14 days per complete curve. The membrane stack is a 6 μm polycarbonate track-etched membrane (0.1 μm pore diameter) sandwiched between two 105 μm cellulosic membranes. Two computer-controlled positive-displacement pumps hold the differential pressure constant to ±5 mbar across 0-1000 mbar. Saturation is tracked by mass balance on produced oil corrected for gas diffusion through the membrane. Equilibration time follows Jennings's <code>L<sup>2</sup>/k</code> scaling, favouring short, small-diameter plugs.</li>
    <li><strong>Young-Laplace IFT scaling breaks down below ~5 mN/m in chalk.</strong> The standard practice of scaling laboratory <code>p<sub>c</sub></code> curves to reservoir IFT via <code>p<sub>c</sub>(σ) = p<sub>c</sub><sup>ref</sup> · σ / σ<sup>ref</sup></code> assumes constant contact angle and simple proportionality. Direct high-pressure measurements on Stevns chalk show that the proportionality fails below approximately 5 mN/m. Plotted as Leverett <em>J</em>-function, the 6.3 and 3.2 mN/m curves nearly coincide, but the 1.5 mN/m curve sits substantially below both, especially at high wetting-phase saturation. Measured high-pressure chalk <code>p<sub>c</sub></code> is roughly half what linear IFT scaling of the low-pressure centrifuge curve predicts. Two candidate physical explanations: apparent contact angle increases as IFT decreases (giving <code>σ cosθ</code> scaling rather than pure <code>σ</code>), and Cahn-transition phase redistribution in the largest pores as gas and oil approach critical properties.</li>
    <li><strong>Gravity-capillary drainage recovery in fractured chalk is underestimated by linearly-scaled laboratory <code>p<sub>c</sub></code>.</strong> Engineering consequence of the IFT-scaling breakdown. Ekofisk-style gas-injection recovery is dominated by gravity-capillary drainage in which the matrix oil is forced out until gravitational head balances capillary retention. Because linear IFT scaling overestimates <code>p<sub>c</sub></code> at low reservoir IFT in chalk, the equilibrium matrix saturation profile retains more oil than the true reservoir behaviour. Predicted ultimate recovery is pessimistically biased. The error is worst below 2 mN/m, which is where mature gas-condensate depletion and miscible-gas displacement designs live.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>One of the early IFT-scaling-failure papers.</strong> Through the 1980s the industry had assumed linear IFT scaling of laboratory <code>p<sub>c</sub></code> curves was safe for chalk. The 1994 Christoffersen-Whitson result is the experimental demonstration that the assumption breaks at the IFT range where most operator decisions actually live. The conservative consequence of the breakdown - that linearly-scaled <code>p<sub>c</sub></code> underpredicts recovery - is the kind of finding that motivates direct high-pressure measurement on the actual reservoir lithology.</p>
    <p><strong>Part of the Ekofisk PVT trilogy.</strong> The 1991 Hu-Whitson-Qi diffusion paper, the 1993 Riazi-Whitson IECR diffusion-coefficient correlations, and this 1994 capillary-pressure paper are the three pillars of Curtis's early-1990s framework for nitrogen-EOR PVT in fractured chalk. Together they cover the bulk-fluid transport properties, the matrix-fracture diffusion physics, and the matrix-block capillary retention. The 1991 paper's IFT-scaled <code>p<sub>c</sub></code> correction is in the right direction but quantitatively insufficient below 5 mN/m; this 1994 paper is the high-pressure measurement that supersedes the linear scaling.</p>
  box_style: influence
- heading: Knowledge Built Upon
  body_html: |-
    <ul>
    <li>Weinaug-Katz parachor IFT method (calibrated with Hough-Stegemeier data)</li>
    <li>Young-Laplace capillary-pressure / IFT scaling - the relationship being tested</li>
    <li>Jennings <code>t ≈ φ L<sup>2</sup> ΔS<sub>w</sub> / (k Δp<sub>c</sub>)</code> equilibration scaling for the apparatus design</li>
    <li>Asar-Handy (1988) - gas-oil relative-permeability observations near critical, consistent with the apparent contact-angle hypothesis</li>
    <li>Cahn-transition theory of phase redistribution in pores near critical conditions</li>
    <li>Hu-Whitson-Qi (1991) SPE-21893 - companion nitrogen-diffusion work in the same Ekofisk programme</li>
    </ul>
  box_style: connections
- heading: What It Contributed To
  body_html: |-
    <ul>
    <li>Direct high-pressure <code>p<sub>c</sub></code> measurement protocols at Statoil and partner operators in the 1990s and 2000s</li>
    <li>Fractured-chalk reservoir simulation studies for Ekofisk and analogues, where the linearly-scaled <code>p<sub>c</sub></code> was previously used</li>
    <li>The broader literature on IFT-scaling breakdown in narrow-pore-distribution rocks</li>
    <li>Whitson-Brule (2000) SPE Monograph capillary-pressure section</li>
    <li>Singh, Fevang &amp; Whitson (2000) and downstream BO-vs-EOS guidelines where capillary number scaling appears in near-wellbore flow</li>
    </ul>
