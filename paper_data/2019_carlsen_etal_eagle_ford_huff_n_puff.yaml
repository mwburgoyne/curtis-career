sections:
- heading: Context
  body_html: |-
    <p>Companion paper to Carlsen et al. 2019 SPE-196056 (Fluid Sampling in Tight Unconventionals). A Whitson AS plus EP Energy plus NTNU collaboration on gas huff-n-puff (HnP) process characterisation in the Eagle Ford. The paper synthesises three perspectives: fundamental phase behaviour via a proposed new PVT experiment, compositional reservoir simulation via a shattered-rock-volume (SRV) framework, and field-scale performance via a compositional-tracking methodology applied to an Eagle Ford pilot. Seven distinct contributions threaded through the workflow.</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>HnP PVT experiment - Constant Volume Injection plus Constant Volume Depletion (CVI-CVD) hybrid.</strong> A novel PVT cell experiment that captures the cyclic build-up / draw-down structure of the HnP process. Step 1: inject gas at constant volume until <code>p<sub>max</sub></code> (mimics the huff). Step 2: single-stage CVD draw down until <code>p<sub>min</sub></code> (mimics the puff); unlike conventional CVD, the initial volume here can be two-phase. Step 3: repeat for the desired cycle count. Multi-stage CVD upgrade yields higher recovery because some production occurs above <code>p<sub>sat</sub></code> where EOR efficiency is higher. Distinct from conventional displacement-focused PVT experiments (slimtube, rising-bubble, vanishing-IFT) which are all predicated on a displacement process that HnP is not.</li>
    <li><strong>Three-scenario phase-behaviour classification with RMI invariance.</strong> Categorises HnP recovery behaviour by where <code>p<sub>min</sub></code> sits relative to <code>p<sub>sat</sub></code> and the first-contact minimum miscibility pressure <code>MMP<sub>FC</sub></code>, yielding three fundamentally different recovery mechanisms: vaporisation-only, mixing-then-vaporisation, mixing-only. Recovery efficiency plotted as <code>RF<sub>C6+</sub></code> vs Relative Moles Injected (RMI) is <em>invariant</em> to the pressure-cycling interval <code>Δp</code> or the number of cycles. RMI is the right independent variable for cross-design comparison; absolute time or cycle count are not.</li>
    <li><strong>SRV multi-scale modelling workflow with rubble-size-dependent recovery.</strong> Three-step procedure for consistent HnP simulation: rubble-fracture single-porosity modelling at cm-to-m scale, upscale to a dual-porosity transfer term, then field / well-scale dual-porosity plus single-porosity composite. End-cycle recovery is inversely proportional to rubble size - smaller rubble means more matrix-fracture surface area means more mixing means more recovery. The workflow lets a small-scale numerical study calibrate the dual-porosity transfer for the field-scale model.</li>
    <li><strong>Dual-porosity vs single-porosity HnP compositional-signature contrast as field diagnostic.</strong> Single-porosity gives a piston-like response with no incremental uplift; dual-porosity with an SRV gives a mixing-driven response with substantial uplift. The two models differ strongly in produced GOR, API, C1, and C7+ trends - and those trends are themselves the diagnostic for which regime the field operates in. Field engineers can identify the operating regime by looking at production-composition trends rather than by argument.</li>
    <li><strong>HnP compositional-tracking methodology with two modes.</strong> EOS-based daily wellstream computation from readily-available production data. Mode 1 (sampling-available, Whitson-Sunjerga 2012): regresses wellstream composition to match all measured oil and gas properties via <code>f<sub>g</sub></code>, C1-C6 slate, and C7+ MW. Mode 2 (production-only, Hoda-Whitson 2013): flashes the most-recent wellstream estimate and recombines to match the producing GOR. Basin-wide 35-component PR EOS C6-C30+.</li>
    <li><strong>Numerical-dispersion sign-reversal for HnP vs conventional gas EOR.</strong> The counter-intuitive numerical finding. Insufficient gridding in conventional miscible displacement gives artificially <em>low</em> recovery (numerical dispersion smears the miscible front). Insufficient gridding in HnP gives artificially <em>high</em> recovery (coarse-grid numerical mixing inflates SRV mixing). Reverses the conventional grid-sensitivity intuition - HnP engineers cannot transfer their displacement-flood grid-refinement habits.</li>
    <li><strong>Confinement concept plus Hammock plot diagnostic.</strong> An HnP control volume around the well and its neighbours frames the injection-gas loss question. The Hammock plot (cumulative injected gas vs average surface tubing pressure, across huff and puff cycles) exposes cycle-to-cycle hysteresis and improving pressure-build-up efficiency between cycles. For perfect confinement the HnP process behaves essentially as gas storage in a very-low-permeability system. The plot makes confinement a measurable quantity rather than an unspoken assumption.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>An experiment designed for the process.</strong> Curtis's teaching pattern: when an EOR process does not fit the standard PVT-experiment toolkit (slimtube, rising-bubble, vanishing-IFT all assume displacement), build the experiment that matches the process. The CVI-CVD hybrid captures HnP's cyclic structure in a PVT cell. The fact that conventional EOR-screening PVT experiments were used for HnP for years despite not matching the process is the kind of intellectual debt this paper resolves.</p>
    <p><strong>RMI as the right independent variable.</strong> The invariance of <code>RF<sub>C6+</sub></code> vs RMI across <code>Δp</code> and cycle count means that HnP recovery efficiency is fundamentally about how many moles you have injected, not how you have cycled them. This is a clean engineering result that simplifies design: optimise total moles injected, set cycling for operational convenience.</p>
    <p><strong>The numerical-dispersion reversal.</strong> Engineers who learned grid-refinement intuition on miscible-displacement floods will get HnP wrong by exactly the wrong sign if they transfer that intuition uncorrected. The paper's explicit warning is the kind of practitioner-protecting result that pays back the cost of reading the paper many times over.</p>
