sections:
- heading: Context
  body_html: |-
    <p>Follow-up to Carlsen-Whitson 2019 URTeC-539 (HnP compositional tracking in the Eagle Ford <em>black oil area</em>) applied to a separate Eagle Ford HnP field project in the <em>gas condensate area</em> (<code>R<sub>si</sub></code> 3000-5000 scf/STB). Same Whitson AS plus EP Energy plus NTNU collaboration. Same HnP operational parameters (15 cycles, 15-45 day injection duration, 14-16 MMscf/D, 200-600 MMscf per cycle, injection gas 75% C1 / 13% C2 / 5% C3 / 7% C4+).</p>
- heading: Key Contributions
  body_html: |-
    <ul>
    <li><strong>Wellstream C<sub>7+</sub> signature as HnP process-efficiency diagnostic.</strong> Time-resolved wellstream <code>C<sub>7+</sub></code> during the puff cycle distinguishes mixing-driven from displacement-driven HnP. <em>Efficient mixing</em> signature: C<sub>7+</sub> starts at 0.5-1 mol% then <em>decreases</em> as BHP declines, matching DP simulation predictions and the SV-plus-diffusion premise. <em>Inefficient piston-like displacement</em> signature: C<sub>7+</sub> rises from the injection-gas composition back toward the pre-implementation composition, matching SP planar-fracture simulation. The field measurement becomes a direct go/no-go test for whether HnP is delivering on its physical premise.</li>
    <li><strong>Gas-condensate area vs black-oil area HnP recovery-efficiency ordering.</strong> Gas-condensate-area wellstream C<sub>7+</sub> during HnP is 0.25-1 mol%; black-oil-area wellstream C<sub>7+</sub> is ~2 mol%. Lower recovery efficiency in the gas-condensate area is <em>not</em> due to a worse process - it is due to a smaller EOR target volume. Oil reservoirs with <code>B<sub>oi</sub></code> &lt; 2 (<code>R<sub>si</sub></code> &lt; 1000 scf/STB) have the largest relative EOR target and the highest sweep efficiency.</li>
    <li><strong>Field validation of the SV / rubble hypothesis.</strong> The wellstream-C<sub>7+</sub> signature from this field matches DP simulation predictions and contradicts SP planar-fracture predictions. Combined with Raterman et al. 2017/2019 ConocoPhillips Eagle Ford and Gale et al. 2018 HFTS Wolfcamp physical evidence, this converts the shattered-volume hypothesis (Mydland-Yusra-Whitson-Dahouk-Carlsen 2020) from premise to field-validated fact for modern Eagle Ford MFHW completions.</li>
    <li><strong>Temperature-MMP inversion between conventional displacement and HnP.</strong> Conventional displacement: <code>MMP<sub>MC</sub></code> is proportional to temperature (higher T → worse displacement). HnP: <code>MMP<sub>FC</sub></code> is inversely proportional to temperature (higher T → better mixing). Swell-test-based MMP characterisation. Counter-intuitive operational implication: higher-temperature reservoirs favour HnP but disfavour conventional miscible flooding - the same reservoir-T axis that hurts conventional EOR helps cyclic-same-well EOR.</li>
    <li><strong>Three operational characteristics of a successful gas-HnP project.</strong> (1) large injection volumes; (2) rapid large pressure buildup indicating good conformance; (3) wells with modern completions creating large surface area via shattering. Plus flagged-as-opinion operational recommendations on containment, communication, fracture gradient, and infill drilling - the Whitson-AS practice notes that have accumulated across the Eagle Ford pilot fleet.</li>
    </ul>
- heading: Significance and Contribution
  body_html: |-
    <p><strong>From hypothesis to field-validated diagnostic.</strong> The shattered-volume premise was a modelling-side argument in the May-2020 mechanisms paper; this July-2020 paper carries it through to a real field signature on a real well. The wellstream-C<sub>7+</sub> diagnostic is now operationally usable: any operator running an HnP cycle can pull the puff-cycle compositional data and ask whether the signature matches mixing or piston-like behaviour.</p>
    <p><strong>The temperature-MMP inversion is a thermo-physical observation with screening consequences.</strong> Operators screening unconventional plays for HnP can use reservoir temperature as a favouring rather than disfavouring axis, which inverts the conventional miscible-flood intuition. Same play, same gas, same MMP measurement methodology - opposite direction of preferability.</p>
    <p><strong>Black-oil-area is the largest EOR target.</strong> Naming the <code>B<sub>oi</sub></code> &lt; 2 / <code>R<sub>si</sub></code> &lt; 1000 scf/STB threshold for largest relative EOR target gives operators a coarse screening axis for which wells in a mixed-fluid play (Bakken oil window, Eagle Ford volatile / black oil transition) deserve HnP pilots first.</p>
